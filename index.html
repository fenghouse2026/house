<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>成屋稅金試算｜永義房屋成功莊敬店</title>
    <meta property="og:title" content="成屋稅金試算｜永義房屋成功莊敬店">
    <meta property="og:description" content="專業成屋獲利與房地合一稅金精算工具">
    <meta name="description" content="成屋稅金試算｜永義房屋成功莊敬店">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-blue: #0071e3;
            --yung-green: #008C4A;
            --yung-red: #D82A29;
            --yung-gold: #FDB913;
            --navy-blue: #001F5B; 
            --glass-white: rgba(255, 255, 255, 0.7);
            --text-dark: #1d1d1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "PingFang TC", sans-serif;
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 🍎 按鈕：極度簡約全白玻璃感 */
        .ui-controls { width: 850px; z-index: 100; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 15px; }
        .btn-group button { 
            border: 1px solid rgba(255,255,255,0.8); padding: 16px 0; border-radius: 14px; cursor: pointer; 
            font-size: 16px; font-weight: 800; flex: 1; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.6); color: #1d1d1f;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .btn-group button:hover { background: rgba(255, 255, 255, 0.9); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .btn-calc { border: 1.5px solid var(--yung-gold) !important; color: #b8860b !important; }

        /* 輸入面板 */
        .control-panel { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            padding: 35px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.5);
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px 45px; margin-top: 20px;
        }
        .input-group label { display: block; font-weight: 900; margin-bottom: 8px; font-size: 14px; color: var(--yung-green); }
        .input-row { display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; }
        input, select { 
            width: 100%; padding: 12px 0; border: none; font-size: 19px; 
            background: transparent; color: var(--text-dark); font-weight: 800; outline: none;
        }
        select { min-width: 50px; cursor: pointer; }

        #output-container {
            width: 850px; background: rgba(255, 255, 255, 0.98);
            padding: 80px 75px; box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08); margin-bottom: 60px;
        }

        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; border-bottom: 4px solid var(--yung-gold); padding-bottom: 20px; }
        .brand-logo-img { height: 85px; }
        .report-title { color: var(--text-dark); font-size: 38px; font-weight: 1000; margin: 0; letter-spacing: -1.5px; }

        .summary-panel {
            background: rgba(253, 185, 19, 0.03); border-radius: 20px; border: 2.5px solid var(--yung-gold);
            padding: 35px; margin-bottom: 45px;
        }
        .summary-line { font-size: 19px; color: #333; font-weight: 700; line-height: 2.2; }
        .summary-line b { color: #000; font-size: 21px; font-weight: 1000; margin: 0 2px; }

        .hint-bar {
            background: #fffdf2; border-radius: 100px; padding: 16px 35px; margin-bottom: 50px;
            display: flex; align-items: center; justify-content: center; font-size: 17px; 
            font-weight: 900; color: var(--navy-blue); border: 2px solid rgba(253, 185, 19, 0.25);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { font-size: 17px; color: #000; font-weight: 950; padding: 20px 0; text-align: center; border-bottom: 4px solid var(--yung-gold); }
        .th-note { font-size: 11px; color: #666; font-weight: 700; display: block; margin-top: 4px; }
        
        td { padding: 35px 0; text-align: center; vertical-align: middle; border-bottom: 1px solid #f0f0f0; }
        
        .col-price { font-size: 34px; color: var(--navy-blue); font-weight: 1000; letter-spacing: -1px; }
        .col-main-data { font-size: 26px; color: #000; font-weight: 900; }
        .col-net { font-size: 48px; color: var(--yung-red); font-weight: 1000; letter-spacing: -2px; }
        .data-note { font-size: 11px; color: #555; font-weight: 800; display: block; margin-top: 8px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .footer { margin-top: 75px; padding-top: 45px; border-top: 4px solid #000; display: flex; justify-content: space-between; align-items: flex-end; }
        .footer-left strong { font-size: 28px; color: #000; display: block; margin-bottom: 10px; font-weight: 1000; }
        .footer-right { text-align: right; color: #666; font-size: 16px; font-weight: 700; line-height: 2.2; }

        .watermark { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 85%; opacity: 0.06; pointer-events: none; z-index: 0; }

        @media (max-width: 850px) {
            .ui-controls { width: 95%; }
            #output-container { transform: scale(0.4); transform-origin: top center; margin-bottom: -700px; }
        }
    </style>
</head>
<body>

<div class="ui-controls">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">重新試算數據</button>
        <button class="btn-share" onclick="handleMobileShare()">手機儲存相片</button>
        <button class="btn-pc" onclick="handlePCDownload()">電腦儲存相片</button>
    </div>

    <div class="control-panel">
        <div class="input-group"><label>買入房價 (萬)</label><input type="number" id="costPrice" value="886" oninput="generateTable()"></div>
        <div class="input-group"><label>裝潢(需發票) (萬)</label><input type="number" id="renoCost" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買入服務費 (萬)</label><input type="number" id="buyAg" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買入規費 (萬)</label><input type="number" id="buyFe" value="0" oninput="generateTable()"></div>
        
        <div class="input-group">
            <label>賣出服務費</label>
            <div class="input-row">
                <select id="feeType" onchange="generateTable()">
                    <option value="percent">%</option>
                    <option value="fixed">萬</option>
                </select>
                <input type="number" id="agencyVal" value="4" oninput="generateTable()">
            </div>
        </div>

        <div class="input-group">
            <label>房地合一稅率設定</label>
            <select id="taxRate" onchange="generateTable()" style="border-bottom: 2px solid #eee;">
                <option value="45">45% (持有 2 年內)</option>
                <option value="35">35% (持有 2-5 年)</option>
                <option value="20" selected>20% (持有超過 5 年)</option>
                <option value="10">設籍且自住滿 6 年 (400 萬免稅額) 10%</option>
            </select>
        </div>

        <div class="price-settings" style="grid-column: span 2; display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 15px; padding-top: 20px; border-top: 1px dashed #d2d2d7; margin-top: 10px;">
            <div class="input-group"><label>基準成交價 (萬)</label><input type="number" id="basePrice" value="1500" oninput="generateTable()"></div>
            <div class="input-group">
                <label>級距單位</label>
                <select id="stepValue" onchange="generateTable()">
                    <option value="1">1萬</option>
                    <option value="5">5萬</option>
                    <option value="10" selected>10萬</option>
                </select>
            </div>
            <div class="input-group"><label>延展筆數</label><input type="number" id="rowCount" value="8" oninput="generateTable()"></div>
        </div>
    </div>
</div>

<div id="output-container">
    <img src="logo浮水印.png" class="watermark" alt="浮水印" onerror="this.style.display='none'">
    
    <div class="report-header">
        <img src="logo.png" class="brand-logo-img" alt="LOGO">
        <h1 class="report-title">成屋獲利對照報告</h1>
    </div>

    <div class="summary-panel">
        <div class="summary-line" id="sumLine1">
            取得：買入房價 <b>886</b> | 裝潢(需發票) <b>0</b> | 服務費 <b>0</b> | 規費 <b>0</b>
        </div>
        <div class="summary-line" id="sumLine2">
            稅務：稅率 <b>20%</b> | 賣出服務費 <b>4%</b> | 賣出規費 <b>0</b>
        </div>
    </div>

    <div class="hint-bar">
        <span>💡</span> 系統已自動選擇最優抵扣費用 (實付仲介費 vs 免稅額3%最高30萬)
    </div>

    <div class="report-content">
        <table>
            <thead>
                <tr>
                    <th style="width:20%">成交預估價<br><span class="th-note">(預估成交金額)</span></th>
                    <th style="width:16%">服務費用<br><span class="th-note">(支出成本)</span></th>
                    <th style="width:24%">課稅所得額<br><span class="th-note">(成交-成本-抵扣)</span></th>
                    <th style="width:20%">房地稅額<br><span class="th-note">(所得 × 稅率)</span></th>
                    <th style="width:20%; color: var(--yung-red);">最終淨獲利<br><span class="th-note" style="color: var(--yung-red);">(實拿結案)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            <span style="font-size: 18px; color: #555; font-weight: 700;">雲林縣斗六市成功二街126號</span>
        </div>
        <div class="footer-right">
            製表日期：<span id="dateDisplay"></span><br>
            實際稅額以國稅局核定為準。
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyAg = parseFloat(document.getElementById('buyAg').value) || 0;
        const buyFe = parseFloat(document.getElementById('buyFe').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRateSelect = document.getElementById('taxRate');
        const taxVal = parseFloat(taxRateSelect.value);
        const taxTextFull = taxRateSelect.options[taxRateSelect.selectedIndex].text;
        const rows = parseInt(document.getElementById('rowCount').value) || 8;

        // 💡 針對 6 年稅率進行文字精簡，防止表格跑位
        let taxDisplay = taxTextFull.includes("設籍") ? "自住滿 6 年 (10%)" : taxTextFull.split(' ')[0];

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        
        document.getElementById('sumLine1').innerHTML = `取得：買入房價 <b>${cost}</b> | 裝潢(需發票) <b>${reno}</b> | 服務費 <b>${buyAg}</b> | 規費 <b>${buyFe}</b>`;
        const feeDisplay = (feeType === 'percent') ? `${agencyVal}%` : `${agencyVal}萬`;
        document.getElementById('sumLine2').innerHTML = `稅務：房地合一稅 <b>${taxTextFull.split(' ')[0]}</b> | 賣出服務費 <b>${feeDisplay}</b> | 賣出規費 <b>0</b>`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i < rows; i++) {
            let price = base - (i * step);
            if (price < 0) break;
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let totalAcq = cost + reno + buyAg + buyFe;
            let rawProfit = price - totalAcq - deduc;
            
            // 計算稅額 (400萬免稅額邏輯)
            let tax = (taxVal === 10) ? Math.max(0, rawProfit - 400) * 0.1 : Math.max(0, rawProfit) * (taxVal / 100);
            let net = price - totalAcq - sellAgency - tax;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td class="col-main-data">${sellAgency.toFixed(1)}</td>
                <td>
                    <span class="col-main-data">${rawProfit.toFixed(1)}</span>
                    <span class="data-note">(抵扣 ${deduc.toFixed(1)} [${sellAgency >= Math.min(price * 0.03, 30) ? '服務費' : '免稅額'}])</span>
                </td>
                <td>
                    <span class="col-main-data">${tax.toFixed(1)}</span>
                    <span class="data-note">(${taxDisplay})</span>
                </td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function captureAndProcess() {
        const target = document.getElementById('output-container');
        const canvas = await html2canvas(target, { 
            scale: 4, 
            useCORS: true, 
            backgroundColor: "#ffffff", 
            width: 850,
            height: target.offsetHeight,
            onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('output-container');
                el.style.transform = 'none'; el.style.margin = '0';
                el.style.background = "#ffffff";
                el.style.border = "1px solid #e5e5ea"; 
                el.style.borderRadius = "0";
            }
        });
        return canvas;
    }

    async function handleMobileShare() {
        const canvas = await captureAndProcess();
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '永義房屋專業資產報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利試算報告' });
            }
        });
    }

    async function handlePCDownload() {
        const canvas = await captureAndProcess();
        const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = '永義房屋藝術報告.png'; a.click();
    }
    window.onload = generateTable;
</script>
</body>
</html>
