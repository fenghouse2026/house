<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永義房屋|成功莊敬店</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .apple-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .navy-gradient {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl apple-glass rounded-[2rem] shadow-2xl overflow-hidden">
        <div class="navy-gradient p-8 text-white">
            <h1 class="text-2xl font-light tracking-tight">房地合一稅 2.0 <span class="font-bold">專業試算</span></h1>
            <p class="opacity-70 text-sm mt-1">承峰不動產（雲林斗六店）專用系統</p>
        </div>

        <div class="p-8 space-y-8">
            <section>
                <h2 class="text-sm font-bold text-[#001f3f] mb-4 flex items-center">
                    <span class="w-1.5 h-4 bg-[#001f3f] rounded-full mr-2"></span> 取得成本項目
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1">買入總價</label>
                        <input type="number" id="buyPrice" placeholder="0" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition font-medium">
                        <span class="absolute right-3 top-3 text-gray-400">萬</span>
                    </div>
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1">裝潢發票</label>
                        <input type="number" id="decorFee" placeholder="0" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                        <span class="absolute right-3 top-3 text-gray-400">萬</span>
                    </div>
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1">買入服務費</label>
                        <input type="number" id="buyAgentFee" placeholder="0" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                        <span class="absolute right-3 top-3 text-gray-400">萬</span>
                    </div>
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1">買入規費/代書費</label>
                        <input type="number" id="buyOtherFee" placeholder="0" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                        <span class="absolute right-3 top-3 text-gray-400">萬</span>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-sm font-bold text-[#001f3f] mb-4 flex items-center">
                    <span class="w-1.5 h-4 bg-blue-400 rounded-full mr-2"></span> 賣出與稅務支出
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1 text-blue-500 font-bold">預計賣出總價</label>
                        <input type="number" id="sellPrice" placeholder="0" class="w-full border-2 border-blue-100 rounded-xl p-3 focus:border-blue-500 outline-none transition font-bold text-blue-600">
                        <span class="absolute right-3 top-3 text-blue-400">萬</span>
                    </div>
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1">持有時間 (稅率)</label>
                        <select id="taxRate" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition bg-white appearance-none">
                            <option value="0.45">2年內 (45%)</option>
                            <option value="0.35">2-5年 (35%)</option>
                            <option value="0.20">5-10年 (20%)</option>
                            <option value="0.15">10年以上 (15%)</option>
                            <option value="0.10">自住減免 (10%)</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-4 text-gray-300 text-xs pointer-events-none"></i>
                    </div>
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1">賣出服務費</label>
                        <input type="number" id="sellAgentFee" placeholder="0" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                        <span class="absolute right-3 top-3 text-gray-400">萬</span>
                    </div>
                    <div class="relative">
                        <label class="text-xs text-gray-400 absolute -top-2 left-3 bg-white px-1">賣出規費</label>
                        <input type="number" id="sellOtherFee" placeholder="0" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                        <span class="absolute right-3 top-3 text-gray-400">萬</span>
                    </div>
                </div>
            </section>

            <button onclick="calculate()" class="w-full py-5 navy-gradient text-white rounded-2xl font-bold shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-200">
                產出成交稅務報告
            </button>

            <div id="report" class="hidden space-y-4 pt-4 border-t border-gray-100">
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl">
                    <span class="text-gray-500">應繳稅額</span>
                    <span id="resTax" class="text-2xl font-black text-red-500">0 萬</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-[#001f3f]/5 rounded-2xl">
                    <span class="text-[#001f3f] font-bold">預估稅後淨獲利</span>
                    <span id="resNet" class="text-2xl font-black text-green-600">0 萬</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            // 讀取數值
            const v = (id) => parseFloat(document.getElementById(id).value) || 0;
            
            const buyPrice = v('buyPrice');
            const decor = v('decorFee');
            const bAgent = v('buyAgentFee');
            const bOther = v('buyOtherFee');
            
            const sellPrice = v('sellPrice');
            const sAgent = v('sellAgentFee');
            const sOther = v('sellOtherFee');
            const rate = v('taxRate');

            // 計算邏輯
            const totalCost = buyPrice + decor + bAgent + bOther;
            const expense = sAgent + sOther;
            const profitBeforeTax = sellPrice - totalCost - expense;
            
            let tax = profitBeforeTax > 0 ? profitBeforeTax * rate : 0;
            let netProfit = profitBeforeTax - tax;

            // 顯示結果
            document.getElementById('report').classList.remove('hidden');
            document.getElementById('resTax').innerText = tax.toFixed(2) + " 萬";
            document.getElementById('resNet').innerText = netProfit.toFixed(2) + " 萬";
        }
    </script>
</body>
</html>
