<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永義房屋｜究極光感報表系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-gold: #FDB913;
            --yung-green: #008C4A;
            --navy-blue: #001F5B;
            --apple-red: #D82A29;
            --pure-black: #1d1d1f;
            --glass-white: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "PingFang TC", sans-serif;
            background: #f5f5f7; margin: 0; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        /* 按鈕組 */
        .ui-controls { width: 850px; z-index: 100; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 12px; }
        .btn-group button { 
            border: none; padding: 16px 0; border-radius: 18px; cursor: pointer; 
            font-size: 16px; font-weight: 800; flex: 1; transition: 0.3s;
            background: #1d1d1f; color: white;
        }
        .btn-calc { border: 2.5px solid var(--yung-gold) !important; color: var(--yung-gold) !important; }
        .btn-share { background: white !important; color: #000 !important; border: 2px solid #000 !important; }

        /* 控制面板 - 修正選單寬度 */
        .control-panel { 
            background: white; padding: 35px; border-radius: 30px; border: 1px solid #d2d2d7;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px 40px; margin-top: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .input-group label { display: block; font-weight: 900; margin-bottom: 8px; font-size: 14px; color: var(--yung-green); }
        .input-row { display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #eee; }
        input, select { 
            width: 100%; padding: 12px 0; border: none; font-size: 18px; 
            background: transparent; color: var(--pure-black); font-weight: 800; outline: none;
        }
        select { cursor: pointer; min-width: 75px; } /* 💡 確保寬度不吃字 */

        /* 🍎 輸出容器 - 💡 黃金比例字體 */
        #output-container {
            width: 850px; background: white;
            padding: 80px 75px; box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1); margin-bottom: 60px;
        }

        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; border-bottom: 3.5px solid var(--yung-gold); padding-bottom: 20px; }
        .brand-logo-img { height: 80px; }
        .report-title { color: var(--pure-black); font-size: 36px; font-weight: 1000; margin: 0; letter-spacing: -1.5px; }

        .summary-panel {
            background: rgba(253, 185, 19, 0.03); border-radius: 20px; border: 2px solid var(--yung-gold);
            padding: 30px; margin-bottom: 45px;
        }
        .summary-line { font-size: 19px; color: #333; font-weight: 700; line-height: 2; }
        .summary-line b { color: var(--pure-black); font-size: 22px; font-weight: 1000; }

        .hint-bar {
            background: #fffdf0; border-radius: 100px; padding: 14px 35px; margin-bottom: 50px;
            display: flex; align-items: center; justify-content: center; font-size: 16px; 
            font-weight: 850; color: var(--navy-blue); border: 1.5px solid rgba(253, 185, 19, 0.3);
        }

        /* 表格區 - 💡 調整字體大小與間距，消除壓迫感 */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { font-size: 16px; color: #000; font-weight: 950; padding: 18px 0; text-align: center; border-bottom: 4px solid var(--yung-gold); }
        .th-note { font-size: 11px; color: #666; font-weight: 700; display: block; margin-top: 4px; }
        
        td { padding: 35px 0; text-align: center; vertical-align: middle; border-bottom: 1.5px solid #f0f0f0; }
        
        .col-price { font-size: 30px; color: var(--navy-blue); font-weight: 1000; }
        .col-main-data { font-size: 24px; color: var(--pure-black); font-weight: 900; }
        .col-net { font-size: 40px; color: var(--apple-red); font-weight: 1000; letter-spacing: -1.5px; } /* 💡 舒適的大尺寸 */
        .data-note { font-size: 12px; color: #555; font-weight: 800; display: block; margin-top: 6px; white-space: nowrap; }

        .footer { margin-top: 70px; padding-top: 40px; border-top: 4px solid #000; display: flex; justify-content: space-between; align-items: flex-end; }
        .footer-left strong { font-size: 26px; color: #000; display: block; margin-bottom: 10px; font-weight: 1000; }
        .footer-right { text-align: right; color: #666; font-size: 14px; font-weight: 700; line-height: 2; }

        .watermark { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 80%; opacity: 0.05; pointer-events: none; z-index: 0; }

        @media (max-width: 850px) {
            .ui-controls { width: 95%; }
            #output-container { transform: scale(0.4); transform-origin: top center; margin-bottom: -700px; }
        }
    </style>
</head>
<body>

<div class="ui-controls">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">重新計算數據</button>
        <button class="btn-share" onclick="handleMobileShare()">手機儲存相片</button>
        <button class="btn-pc" onclick="handlePCDownload()">電腦儲存相片</button>
    </div>

    <div class="control-panel">
        <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="886" oninput="generateTable()"></div>
        <div class="input-group"><label>列舉裝潢 (萬)</label><input type="number" id="renoCost" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買方仲介費 (萬)</label><input type="number" id="buyAg" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買入規費 (萬)</label><input type="number" id="buyFe" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>基準成交預估 (萬)</label><input type="number" id="basePrice" value="1500" oninput="generateTable()"></div>
        
        <div class="input-group">
            <label>賣方服務費</label>
            <div class="input-row">
                <select id="feeType" onchange="generateTable()">
                    <option value="percent">% (百分比)</option>
                    <option value="fixed">萬 (固定額)</option>
                </select>
                <input type="number" id="agencyVal" value="4" oninput="generateTable()">
            </div>
        </div>

        <div class="input-group">
            <label>房地合一稅率</label>
            <select id="taxRate" onchange="generateTable()" style="border-bottom: 2px solid #eee;">
                <option value="45">45% (持有 2 年內)</option>
                <option value="35">35% (持有 2-5 年)</option>
                <option value="20" selected>20% (持有超過 5 年)</option>
                <option value="10">設籍且自住滿 6 年 (400 萬免稅額) 10%</option>
            </select>
        </div>
        <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6" oninput="generateTable()"></div>
    </div>
</div>

<div id="output-container">
    <img src="logo浮水印.png" class="watermark" alt="浮水印" onerror="this.style.display='none'">
    <div class="report-header">
        <img src="logo.png" class="brand-logo-img" alt="LOGO">
        <h1 class="report-title">成屋獲利對照報告</h1>
    </div>

    <div class="summary-panel">
        <div class="summary-line" id="sumLine1">取得：買入 <b>886</b> | 裝潢 <b>0</b> | 買仲 <b>0</b> | 規費 <b>0</b></div>
        <div class="summary-line" id="sumLine2">稅務：稅率 <b>20%</b> | 賣仲費 <b>4%</b> | 賣出規費 <b>0</b></div>
    </div>

    <div class="hint-bar">
        <span>💡</span> 系統已自動選擇最優抵扣費用 (實付仲介費 vs 免稅額3%最高30萬)
    </div>

    <div class="report-content">
        <table>
            <thead>
                <tr>
                    <th style="width:20%">成交預估價<br><span class="th-note">(預估成交金額)</span></th>
                    <th style="width:16%">服務費用<br><span class="th-note">(支出成本)</span></th>
                    <th style="width:23%">課稅所得額<br><span class="th-note">(成交-成本-抵扣)</span></th>
                    <th style="width:21%">房地稅額<br><span class="th-note">(所得 × 稅率)</span></th>
                    <th style="width:20%">最終淨獲利<br><span class="th-note">(實拿結案)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            <span style="font-size: 17px; color: #555; font-weight: 700;">雲林縣斗六市成功二街126號</span>
        </div>
        <div class="footer-right">
            製表日期：<span id="dateDisplay"></span><br>
            實際稅額以國稅局核定為準。
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyAg = parseFloat(document.getElementById('buyAg').value) || 0;
        const buyFe = parseFloat(document.getElementById('buyFe').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 1500;
        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRateSelect = document.getElementById('taxRate');
        const taxVal = parseFloat(taxRateSelect.value);
        const taxText = taxRateSelect.options[taxRateSelect.selectedIndex].text;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        document.getElementById('sumLine1').innerHTML = `取得：買入 <b>${cost}</b> | 裝潢 <b>${reno}</b> | 買仲 <b>${buyAg}</b> | 規費 <b>${buyFe}</b>`;
        const feeDisplay = (feeType === 'percent') ? `${agencyVal}%` : `${agencyVal}萬`;
        document.getElementById('sumLine2').innerHTML = `稅務：稅率 <b>${taxText.split(' ')[0]}</b> | 賣仲費 <b>${feeDisplay}</b> | 賣出規費 <b>0</b>`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i < rows; i++) {
            let price = base - (i * 10);
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let totalAcq = cost + reno + buyAg + buyFe;
            let rawProfit = price - totalAcq - deduc;
            let tax = (taxVal === 10) ? Math.max(0, rawProfit - 400) * 0.1 : Math.max(0, rawProfit) * (taxVal / 100);
            let net = price - totalAcq - sellAgency - tax;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td class="col-main-data">${sellAgency.toFixed(1)}</td>
                <td>
                    <span class="col-main-data">${rawProfit.toFixed(1)}</span>
                    <span class="data-note">(抵扣 ${deduc.toFixed(1)} [${sellAgency >= Math.min(price * 0.03, 30) ? '仲介費' : '免稅額'}])</span>
                </td>
                <td>
                    <span class="col-main-data">${tax.toFixed(1)}</span>
                    <span class="data-note">(${taxText.split('%')[0]}% 稅率)</span>
                </td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function captureAndProcess() {
        const target = document.getElementById('output-container');
        const canvas = await html2canvas(target, { 
            scale: 3, 
            useCORS: true, 
            backgroundColor: null, 
            width: 850,
            height: target.offsetHeight,
            onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('output-container');
                el.style.transform = 'none'; el.style.margin = '0';
                // 💡 存圖：回歸清透感，避免太黃
                el.style.background = "linear-gradient(165deg, #ffffff 0%, #fcfcf4 100%)";
                el.style.borderRadius = "0";
            }
        });
        return canvas;
    }

    async function handleMobileShare() {
        const canvas = await captureAndProcess();
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '永義房屋專業報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利試算' });
            }
        });
    }

    async function handlePCDownload() {
        const canvas = await captureAndProcess();
        const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = '永義房屋報告.png'; a.click();
    }
    window.onload = generateTable;
</script>
</body>
</html>
