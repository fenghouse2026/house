<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永義房屋｜成功莊敬店 </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-blue: #0071e3;
            --yung-green: #008C4A;
            --yung-red: #D82A29;
            --yung-gold: #FDB913;
            --navy-blue: #001F5B;
            --glass-white: rgba(255, 255, 255, 0.72);
            --border-light: rgba(255, 255, 255, 0.4);
            --text-dark: #1d1d1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "PingFang TC", sans-serif;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 💡 背景動態暖光 (清透優化) */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(253, 185, 19, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 140, 74, 0.08) 0%, transparent 40%);
            z-index: -2;
        }

        /* 操作按鈕組 */
        .ui-controls { width: 850px; z-index: 100; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 12px; }
        .btn-group button { 
            border: none; padding: 14px 0; border-radius: 16px; cursor: pointer; 
            font-size: 16px; font-weight: 800; flex: 1; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-calc { background: #1d1d1f; color: white; }
        .btn-share { background: white; color: var(--apple-blue); border: 2px solid var(--apple-blue) !important; }
        .btn-pc { background: #1d1d1f; color: white; }
        .btn-group button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        /* 控制面板：通透磨砂質感 */
        .control-panel { 
            background: var(--glass-white); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 35px; border-radius: 28px; border: 1px solid var(--border-light);
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px 30px; margin-bottom: 30px;
        }
        .input-group label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 13px; color: var(--yung-green); }
        input, select { 
            width: 100%; padding: 13px; border-radius: 12px; border: 1px solid #d2d2d7;
            font-size: 16px; box-sizing: border-box; background: rgba(255,255,255,0.7); font-weight: 700;
        }

        /* 🍎 A4 究極藝術容器 - 💡 特殊：存圖本身自帶毛玻璃漸層 */
        #output-container {
            width: 850px; 
            background: rgba(255, 255, 255, 0.9);
            padding: 55px 60px; box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08); margin-bottom: 50px;
        }

        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 3px solid var(--yung-gold); padding-bottom: 15px; }
        .brand-logo-img { height: 75px; }
        .report-title { color: var(--yung-green); font-size: 32px; font-weight: 900; margin: 0; }

        /* 條件摘要 */
        .summary-panel {
            background: rgba(255, 255, 255, 0.5); border: 1.5px solid var(--yung-gold);
            padding: 25px 30px; margin-bottom: 25px; border-radius: 20px;
        }
        .summary-title { font-size: 24px; font-weight: 900; color: var(--yung-green); margin-bottom: 12px; display: block; }
        .summary-line { font-size: 19px; color: #333; font-weight: 600; line-height: 2.2; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 8px; }
        .summary-line b { color: #000; font-size: 21px; margin: 0 4px; font-weight: 900; }

        /* 💡 提示列 (image_8e7d5a 文字修正) */
        .hint-bar {
            background: rgba(0, 113, 227, 0.04); border: 1px solid rgba(0, 113, 227, 0.1);
            border-radius: 50px; padding: 12px 25px; margin-bottom: 35px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 16px; font-weight: 700; color: #1e3a8a;
        }

        /* 表格區 - 極致大字體與公式回歸 (image_8e797a) */
        table { width: 100%; border-collapse: separate; border-spacing: 0 15px; position: relative; z-index: 1; table-layout: fixed; }
        th { font-size: 15px; color: #1d1d1f; font-weight: 900; padding: 10px 0; text-align: center; border-bottom: 2px solid var(--yung-gold); vertical-align: top; }
        .th-note { font-size: 10px; color: var(--text-gray); font-weight: 500; display: block; margin-top: 3px; }
        
        td { padding: 22px 0; text-align: center; vertical-align: middle; border-bottom: 1px solid rgba(0,0,0,0.04); background: transparent !important; }
        
        .col-price { font-size: 30px; color: var(--navy-blue); font-weight: 900; }
        .col-main-data { font-size: 24px; color: #000; font-weight: 800; }
        .col-net { font-size: 38px; color: var(--yung-red); font-weight: 950; }
        .data-note { font-size: 11px; color: var(--text-gray); font-weight: 700; display: block; margin-top: 5px; white-space: nowrap; }

        /* 頁腳 */
        .footer { margin-top: 40px; padding-top: 30px; border-top: 2px solid var(--yung-gold); display: flex; justify-content: space-between; align-items: flex-end; }
        .footer-left strong { font-size: 22px; color: #000; display: block; margin-bottom: 5px; font-weight: 900; }
        .footer-left span { font-size: 16px; color: var(--text-gray); font-weight: 700; }
        .footer-right { text-align: right; color: var(--text-gray); font-size: 13px; line-height: 1.8; }

        .watermark { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 80%; opacity: 0.08; pointer-events: none; z-index: 0; }

        @media (max-width: 800px) {
            .ui-controls { width: 95%; }
            #output-container { transform: scale(0.42); transform-origin: top center; margin-bottom: -650px; }
        }
    </style>
</head>
<body>

<div class="ui-controls">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">重新計算數據</button>
        <button class="btn-share" onclick="handleMobileShare()">手機儲存相片</button>
        <button class="btn-pc" onclick="handlePCDownload()">電腦儲存相片</button>
    </div>

    <div class="control-panel">
        <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="886" oninput="generateTable()"></div>
        <div class="input-group"><label>列舉裝潢 (萬)</label><input type="number" id="renoCost" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買方仲介費 (萬)</label><input type="number" id="buyAg" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>買入規費 (萬)</label><input type="number" id="buyFe" value="0" oninput="generateTable()"></div>
        <div class="input-group"><label>基準成交預估 (萬)</label><input type="number" id="basePrice" value="1500" oninput="generateTable()"></div>
        <div class="input-group">
            <label>賣方服務費</label>
            <div style="display:flex; gap:10px;">
                <select id="feeType" onchange="generateTable()" style="flex:0.8;"><option value="percent">% (百分比)</option><option value="fixed">萬 (固定額)</option></select>
                <input type="number" id="agencyVal" value="4" oninput="generateTable()" style="flex:1.2;">
            </div>
        </div>
        <div class="input-group">
            <label>房地合一稅率</label>
            <select id="taxRate" onchange="generateTable()">
                <option value="45">45% (持有 2 年內)</option>
                <option value="35">35% (持有 2-5 年)</option>
                <option value="20" selected>20% (持有超過 5 年)</option>
                <option value="10">設籍且自住滿 6 年 (400 萬免稅額) 10%</option>
            </select>
        </div>
        <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6" oninput="generateTable()"></div>
    </div>
</div>

<div id="output-container">
    <img src="logo浮水印.png" class="watermark" alt="浮水印" onerror="this.style.display='none'">
    <div class="report-header">
        <img src="logo.png" class="brand-logo-img" alt="LOGO">
        <h1 class="report-title">成屋獲利對照報告</h1>
    </div>

    <div class="summary-panel">
        <span class="summary-title">報告設定條件：</span>
        <div class="summary-line" id="sumLine1">取得：買入 <b>886</b> | 裝潢 <b>0</b> | 買仲 <b>0</b> | 規費 <b>0</b></div>
        <div class="summary-line" id="sumLine2">稅務：稅率 <b>20%</b> | 賣仲費 <b>4%</b> | 賣出規費 <b>0</b></div>
    </div>

    <div class="hint-bar">
        <span>💡</span> 系統已自動選擇最優抵扣費用 (實付仲介費 vs 免稅額3%最高30萬)
    </div>

    <div class="report-content">
        <table>
            <thead>
                <tr>
                    <th style="width:19%">成交價<span class="th-note">(預估成交)</span></th>
                    <th style="width:15%">服務費<span class="th-note">(支出成本)</span></th>
                    <th style="width:23%">課稅所得<span class="th-note">(成交-成本-抵扣)</span></th>
                    <th style="width:21%">房地稅額<span class="th-note">(所得×稅率)</span></th>
                    <th style="width:22%">最終淨獲利<span class="th-note">(實拿結案)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            <span>雲林縣斗六市成功二街126號</span>
        </div>
        <div style="text-align:right;">
            製表日期：<span id="dateDisplay"></span><br>
            實際稅額以國稅局核定為準。
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyAg = parseFloat(document.getElementById('buyAg').value) || 0;
        const buyFe = parseFloat(document.getElementById('buyFe').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 1500;
        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRateSelect = document.getElementById('taxRate');
        const taxVal = parseFloat(taxRateSelect.value);
        const taxText = taxRateSelect.options[taxRateSelect.selectedIndex].text;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        document.getElementById('sumLine1').innerHTML = `取得：買入 <b>${cost}</b> | 裝潢 <b>${reno}</b> | 買仲 <b>${buyAg}</b> | 規費 <b>${buyFe}</b>`;
        const feeDisplay = (feeType === 'percent') ? `${agencyVal}%` : `${agencyVal}萬`;
        document.getElementById('sumLine2').innerHTML = `稅務：稅率 <b>${taxText.split(' ')[0]}</b> | 賣仲費 <b>${feeDisplay}</b> | 賣出規費 <b>0</b>`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i=0; i < rows; i++) {
            let price = base - (i * 10);
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let totalAcq = cost + reno + buyAg + buyFe;
            let rawProfit = price - totalAcq - deduc;
            
            let tax = (taxVal === 10) ? Math.max(0, rawProfit - 400) * 0.1 : Math.max(0, rawProfit) * (taxVal / 100);
            let net = price - totalAcq - sellAgency - tax;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td class="col-main-data">${sellAgency.toFixed(1)}</td>
                <td>
                    <span class="col-main-data">${rawProfit.toFixed(1)}</span>
                    <span class="data-note">(抵扣 ${deduc.toFixed(1)} [${deduc === sellAgency ? '採仲介費' : '採免稅額'}])</span>
                </td>
                <td>
                    <span class="col-main-data">${tax.toFixed(1)}</span>
                    <span class="data-note">(${taxText.split('%')[0]}% 稅率)</span>
                </td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    // 💡 特殊優化：擷取時強迫 canvas 維持磨砂玻璃質感，並緊貼邊緣
    async function captureAndProcess() {
        const target = document.getElementById('output-container');
        // 擷取前暫時移除手機縮放 CSS 影響高度偵測
        const originalTransform = target.style.transform;
        const originalMargin = target.style.marginBottom;
        target.style.transform = 'none';
        target.style.marginBottom = '0';

        const canvas = await html2canvas(target, { 
            scale: 4, 
            useCORS: true, 
            backgroundColor: null, 
            width: 850,
            height: target.offsetHeight, // 💡 確保存圖緊貼內容高度，不留白
            onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('output-container');
                el.style.transform = 'none';
                el.style.margin = '0';
                // 💡 針對克隆物件強化琥珀金流體光暈與水晶邊邊 (image_8edad2)
                el.style.background = "linear-gradient(165deg, rgba(255,255,255,0.99) 0%, rgba(255,253,240,0.96) 100%)";
                el.style.boxShadow = "none";
                el.style.borderRadius = "0";
                el.style.border = "1px solid rgba(253, 185, 19, 0.2)";
                
                // 💡 在存圖時再次強迫放大數據字體，確保手機長輩護眼 ( image_8ee619 )
                el.querySelectorAll('.col-price, .col-net').forEach(item => {
                    item.style.fontSize = (parseFloat(window.getComputedStyle(item).fontSize) * 1.05) + 'px';
                    item.style.fontWeight = "950";
                });
            }
        });

        // 恢復手機預覽樣式
        target.style.transform = originalTransform;
        target.style.marginBottom = originalMargin;
        return canvas;
    }

    async function handleMobileShare() {
        const canvas = await captureAndProcess();
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '永義房屋專業報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利試算報告' });
            }
        });
    }

    async function handlePCDownload() {
        const canvas = await captureAndProcess();
        const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = '琥珀水晶報告.png'; a.click();
    }
    window.onload = generateTable;
</script>
</body>
</html>
