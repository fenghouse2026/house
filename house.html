<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成屋獲利對照報告 - 永義房屋</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --premium-blue: #1e3a8a;
            --brand-gray: #595757;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f4f7f6; color: var(--brand-gray);
            padding: 0; margin: 0;
            width: 100%;
            overflow-x: hidden;
        }

        /* 主容器：電腦版限制寬度，手機版滿版 */
        .app-container { 
            width: 95%; 
            max-width: 1050px; 
            margin: 20px auto; 
            background: #fff; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }

        /* 按鈕區 */
        .btn-group { 
            display: flex; 
            justify-content: space-between; 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .btn-group button { 
            border: none; 
            padding: 20px 10px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 20px; 
            font-weight: 900; 
            flex: 1; 
            transition: 0.3s; 
            color: white; 
        }
        .btn-calc { background: var(--yung-green); box-shadow: 0 4px 10px rgba(0, 140, 74, 0.3); }
        .btn-save { background: var(--yung-red); box-shadow: 0 4px 10px rgba(216, 42, 41, 0.3); }
        .btn-pc { background: var(--premium-blue); }

        /* 標題與 Logo */
        .report-branding { 
            text-align: center; 
            margin-bottom: 25px; 
            border-bottom: 2px solid var(--yung-red); 
            padding-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .brand-logo-img { height: 60px; }
        .report-main-title { color: var(--yung-green); font-size: 28px; font-weight: bold; margin: 0; }

        /* 設定區核心：手機上一列一列 */
        .control-panel { background: #fdfdfd; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 25px; }
        .control-panel h2 { text-align: center; font-size: 24px; border-bottom: 2px dashed #ccc; padding-bottom: 15px; margin-top: 0; font-weight: 900; }
        
        .input-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 電腦版兩欄 */
            gap: 20px; 
            margin-bottom: 20px; 
        }
        
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 900; margin-bottom: 8px; font-size: 18px; color: #444; }
        
        input, select { 
            padding: 12px 15px; 
            border: 2px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 22px; 
            font-weight: bold;
            color: #1e3a8a;
            width: 100%;
            box-sizing: border-box;
        }

        /* 報表表格區 (支援手機橫向滑動) */
        .report-area { 
            overflow-x: auto; 
            border-top: 6px solid #fdb913; 
            padding-top: 20px; 
            position: relative;
        }
        table { width: 100%; min-width: 900px; border-collapse: collapse; }
        th { background: #f8fafc; font-size: 16px; padding: 12px 5px; border-bottom: 2px solid #a0aec0; }
        td { font-size: 22px; font-weight: bold; padding: 15px 5px; text-align: center; border-bottom: 1px solid #eee; }
        
        .highlight-row td { background-color: #fff4b3 !important; }
        .col-net { color: var(--yung-red); }

        /* 頁腳 */
        .footer-info { 
            margin-top: 30px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            flex-wrap: wrap; 
            gap: 15px;
        }

        /* 手機版專屬樣式 (Media Query) */
        @media (max-width: 768px) {
            .input-grid { 
                grid-template-columns: 1fr; /* 關鍵：變成單欄一列 */
            }
            .btn-group { 
                flex-direction: column; /* 按鈕垂直排 */
            }
            .report-branding { 
                flex-direction: column; 
                gap: 10px;
            }
            .report-main-title { font-size: 24px; }
            .brand-logo-img { height: 50px; }
        }

        /* 匯出圖片時的狀態處理 */
        .exporting { width: 1050px !important; } 
        .exporting .control-panel, .exporting .btn-group { display: none; }
        #exportSummary { display: none; margin-bottom: 20px; font-size: 20px; background: #f9f9f9; padding: 15px; border-left: 5px solid var(--yung-green); }
        .exporting #exportSummary { display: block; }

        /* Toast */
        #toastMessage {
            visibility: hidden; min-width: 250px; background-color: var(--yung-green); color: #fff;
            text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 999;
            left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 18px; opacity: 0; transition: 0.5s;
        }
        #toastMessage.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="toastMessage">✅ 報表已成功處理！</div>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" id="btnSave" onclick="shareOrDownload()">📤 手機分享/儲存</button>
        <button class="btn-pc" id="btnPc" onclick="directDownloadPC()">💻 電腦下載</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <h2>一、成屋專屬參數設定</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>買入總價 (萬元)</label>
                <input type="number" id="costPrice" value="1000">
            </div>
            <div class="input-group">
                <label>購買時仲介費 (萬元)</label>
                <input type="number" id="buyAgencyFee" value="20">
            </div>
            <div class="input-group">
                <label>購買時代書費規費 (萬元)</label>
                <input type="number" id="buyOtherFees" value="10">
            </div>
            <div class="input-group">
                <label>可列舉裝潢成本 (萬元)</label>
                <input type="number" id="renovationCost" value="50">
            </div>
        </div>

        <div class="input-grid" style="border-top: 1px dashed #ccc; padding-top: 20px;">
            <div class="input-group">
                <label>房地合一稅率 (%)</label>
                <select id="taxRate">
                    <option value="45">45% (持有2年內)</option>
                    <option value="35" selected>35% (持有2-5年)</option>
                    <option value="20">20% (持有5-10年)</option>
                </select>
            </div>
            <div class="input-group">
                <label>賣方仲介費 (%)</label>
                <input type="number" id="agencyRate" value="4">
            </div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <table>
            <thead>
                <tr>
                    <th>成交價</th>
                    <th>實付費用</th>
                    <th>抵扣費用</th>
                    <th>課稅所得</th>
                    <th>稅額</th>
                    <th>淨獲利</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <div><strong>永義房屋斗六成功莊敬加盟店</strong></div>
        <div style="text-align:right;">製表時間：<span id="dateDisplay"></span></div>
    </div>
</div>

<script>
    function showSuccessToast(msg) {
        const t = document.getElementById("toastMessage");
        t.innerText = msg; t.className = "show";
        setTimeout(() => { t.className = ""; }, 3000);
    }

    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const buyFee = (parseFloat(document.getElementById('buyAgencyFee').value) || 0) + (parseFloat(document.getElementById('buyOtherFees').value) || 0);
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const totalAcq = cost + buyFee + reno;
        
        const taxRate = parseFloat(document.getElementById('taxRate').value) / 100;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) / 100;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        document.getElementById('exportSummary').innerHTML = `當前設定：買入 ${cost} 萬 | 買費 ${buyFee} 萬 | 稅率 ${(taxRate*100)}% | 賣仲 ${(agencyRate*100)}%`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        
        // 模擬產生 8 筆數據
        for(let i=0; i<8; i++) {
            let price = cost + 500 - (i * 50);
            let sellExp = price * agencyRate;
            let deduc = Math.max(sellExp, Math.min(price * 0.03, 30));
            let taxBase = Math.max(0, price - totalAcq - deduc);
            let tax = taxBase * taxRate;
            let net = price - totalAcq - sellExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className = 'highlight-row';
            tr.innerHTML = `<td>${price}</td><td>${sellExp.toFixed(1)}</td><td>${deduc.toFixed(1)}</td><td>${taxBase.toFixed(1)}</td><td>${tax.toFixed(1)}</td><td class="col-net">${net.toFixed(1)}</td>`;
            tbody.appendChild(tr);
        }
    }

    async function shareOrDownload() {
        const app = document.getElementById('main-app');
        // 截圖前強制模擬寬螢幕寬度，確保報表美觀
        const isMobile = window.innerWidth < 768;
        if(isMobile) app.style.width = "1050px";
        
        app.classList.add('exporting');
        const canvas = await html2canvas(app, { scale: 2, useCORS: true });
        app.classList.remove('exporting');
        if(isMobile) app.style.width = "";

        canvas.toBlob(async (blob) => {
            const file = new File([blob], '獲利報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利報告' });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = '報告.png'; a.click();
            }
            showSuccessToast("✅ 處理完成！");
        });
    }

    function directDownloadPC() {
        // 簡化電腦下載邏輯
        showSuccessToast("💻 電腦版下載中...");
        shareOrDownload();
    }

    window.onload = generateTable;
</script>
</body>
</html>
