<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --text-main: #333333;
            --border-color: #cccccc;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f4f7f6; color: var(--text-main);
            padding: 0; margin: 0 auto;
            width: 1050px; 
        }

        /* 主程式區塊 */
        .app-container { width: 960px; margin: 30px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        button { border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; width: 280px; }
        .btn-calc { background: var(--yung-green); color: white; }
        .btn-save { background: var(--yung-red); color: white; }

        .report-branding { text-align: center; margin-bottom: 30px; }
        .brand-logo-img { height: 80px; margin-bottom: 10px; }
        .report-main-title { color: #1e3a8a; font-size: 36px; font-weight: bold; margin: 0; letter-spacing: 3px; }

        .section-title { font-size: 20px; font-weight: bold; color: var(--yung-green); margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .input-item { display: block; width: 100%; margin-bottom: 20px; }
        .input-item label { display: block; font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #666; }
        input, select { padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 20px; width: 100%; box-sizing: border-box; outline: none; }

        .report-area { position: relative; margin-top: 30px; }
        .watermark-overlay {
            position: absolute; top: 120px; left: 0; width: 100%; height: calc(100% - 120px);
            pointer-events: none; z-index: 1; opacity: 0.2;
            background-image: url('logo浮水印.png');
            background-repeat: no-repeat; background-position: center; background-size: 450px auto;
        }

        table { width: 100%; border-collapse: collapse; position: relative; z-index: 2; table-layout: fixed; }
        th, td { padding: 18px 5px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { color: #475569; font-size: 18px; vertical-align: top; background: #fff; white-space: nowrap; }
        .th-note { display: block; font-size: 13px; color: #94a3b8; margin-top: 8px; font-weight: normal; }
        td { font-size: 24px; font-weight: bold; color: #1e293b; white-space: nowrap; background: rgba(255,255,255,0.7); }
        
        .highlight-row td { background-color: rgba(255, 251, 235, 0.85) !important; }
        .col-price { color: #1e3a8a; font-size: 28px; }
        .col-net { color: var(--yung-red); font-size: 28px; }
        
        #exportSummary { display: none; background: #f8fafc; padding: 25px; border-radius: 10px; margin-bottom: 25px; font-size: 20px; line-height: 1.8; border: 1px solid #e2e8f0; }

        .footer-info { margin-top: 50px; padding-top: 25px; border-top: 2px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 16px; color: #666; }
        .footer-left strong { font-size: 20px; color: #1e3a8a; display: block; margin-bottom: 8px; }

        /* 擷取圖片時隱藏輸入區 */
        .exporting .control-panel, .exporting .btn-group { display: none; }
        .exporting #exportSummary { display: block; }
        .exporting { box-shadow: none; border: none; margin: 0; }

        /* 🔥 手機長按存圖專用區塊 🔥 */
        #imageOverlay {
            display: none; width: 1050px; background: #e2e8f0; min-height: 100vh;
        }
        .overlay-header {
            background: #1e3a8a; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .overlay-header span { font-size: 26px; font-weight: bold; }
        .overlay-header button { background: white; color: #1e3a8a; width: auto; padding: 12px 25px; font-size: 20px; margin: 0; }
        
        /* 最終生成的純淨圖片 */
        #generatedImg {
            display: block; width: 100%; height: auto; pointer-events: auto;
        }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" onclick="generateAndShowImage()">📸 生成手機圖片</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <div class="section-title">取得成本與稅務設定</div>
        <div class="input-item"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="886"></div>
        <div class="input-item"><label>可認列裝潢成本 (需發票)</label><input type="number" id="renovationCost" value="0"></div>
        <div class="input-item"><label>買方服務費 (萬)</label><input type="number" id="buyAgencyFee" value="0"></div>
        <div class="input-item"><label>買入時規費 (萬)</label><input type="number" id="buyOtherFees" value="0"></div>
        <div class="input-item">
            <label>房地合一稅率</label>
            <select id="taxRate">
                <option value="45" selected>45% (持有2年內)</option>
                <option value="35">35% (持有2-5年)</option>
                <option value="20">20% (持有5-10年)</option>
                <option value="10">10% (自用優惠)</option>
            </select>
        </div>
        <div class="input-item">
            <label>賣方服務費</label>
            <div style="display: flex; gap: 10px;">
                <select id="agencyFeeType" style="width: 100px;"><option value="percent">%</option><option value="fixed">萬</option></select>
                <input type="number" id="agencyRate" value="4" style="flex: 1;">
            </div>
        </div>
        <div class="input-item"><label>賣出時規費 (萬)</label><input type="number" id="otherSellingFees" value="0"></div>

        <div class="section-title" style="margin-top:30px;">成交金額對照設定</div>
        <div class="input-item"><label>基準價 (萬)</label><input type="number" id="basePrice" value="1500"></div>
        <div class="input-item">
            <label>金額級距</label>
            <select id="stepValue">
                <option value="1">1萬</option>
                <option value="5">5萬</option>
                <option value="10" selected>10萬</option>
            </select>
        </div>
        <div class="input-item"><label>顯示筆數</label><input type="number" id="rowCount" value="6"></div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <div class="watermark-overlay"></div>
        <table>
            <thead>
                <tr>
                    <th style="width:15%;">成交價(萬)</th>
                    <th style="width:17%;">實付費用(萬)<span class="th-note">(仲介費+規費)</span></th>
                    <th style="width:20%;">抵扣費用(萬)<span class="th-note">(擇優:仲介費或最高30萬)</span></th>
                    <th style="width:16%;">課稅所得(萬)<span class="th-note">(賣價-總成本-抵扣)</span></th>
                    <th style="width:16%;">房地合一稅(萬)<span class="th-note">(所得 × 稅率 = 稅金)</span></th>
                    <th style="width:16%;">淨獲利(萬)<span class="th-note">(賣價-總成本-實付-稅)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號
        </div>
        <div style="text-align:right;">
            製表時間：<span id="dateDisplay"></span><br>
            <strong>免責聲明：實際稅額以國稅局核定為準。</strong>
        </div>
    </div>
</div>

<div id="imageOverlay">
    <div class="overlay-header">
        <span>💡 請直接「長按下方圖片」儲存至手機相簿</span>
        <button onclick="closeImageMode()">⬅️ 返回修改</button>
    </div>
    <img id="generatedImg" alt="成屋獲利報告">
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const bAgency = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const bOther = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxRateVal = document.getElementById('taxRate').value;
        const taxRate = parseFloat(taxRateVal) / 100;
        const agencyType = document.getElementById('agencyFeeType').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const sOther = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        const totalAcq = cost + reno + bAgency + bOther;
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();

        document.getElementById('exportSummary').innerHTML = `
            <strong>報告設定條件：</strong><br>
            取得成本：買入 ${cost} 萬 | 裝潢 ${reno} 萬 | 買方仲介費 ${bAgency} 萬 | 買入規費 ${bOther} 萬 (總: ${totalAcq.toFixed(1)})<br>
            稅務設定：稅率 ${taxRateVal}% | 賣方仲介費 ${agencyRate}${agencyType==='percent'?'%':'萬'} | 賣出規費 ${sOther} 萬
        `;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        for(let i = 0; i >= -rows + 1; i--) {
            let price = base + (i * step);
            let sellAgency = (agencyType === 'percent') ? (price * agencyRate / 100) : agencyRate;
            let actualSellExp = sellAgency + sOther;
            let deducExp = Math.max(actualSellExp, Math.min(price * 0.03, 30));
            let taxBase = Math.max(0, price - totalAcq - deducExp);
            if (taxRateVal === '10') taxBase = Math.max(0, taxBase - 400);
            let tax = taxBase * taxRate;
            let net = price - totalAcq - actualSellExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td>${actualSellExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}<br><span style="font-size:12px; color:#008C4A; font-weight:bold;">${actualSellExp >= Math.min(price * 0.03, 30) ? '[採仲介費]' : '[採免稅額]'}</span></td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    // 🔥 核心：生成圖片並切換到長按模式 🔥
    function generateAndShowImage() {
        generateTable();
        const mainApp = document.getElementById('main-app');
        mainApp.classList.add('exporting'); // 隱藏按鈕、顯示摘要
        
        // 給瀏覽器 0.3 秒更新排版，然後進行畫面擷取
        setTimeout(() => {
            html2canvas(mainApp, { scale: 2, backgroundColor: "#ffffff", useCORS: true }).then(canvas => {
                // 將畫布轉成真正的圖片檔案
                const imgData = canvas.toDataURL("image/png");
                document.getElementById('generatedImg').src = imgData;
                
                // 隱藏原始操作畫面，顯示圖片疊加層
                mainApp.style.display = 'none';
                mainApp.classList.remove('exporting');
                document.getElementById('imageOverlay').style.display = 'block';
                window.scrollTo(0, 0); // 捲動到最上面
            });
        }, 300);
    }

    // 返回修改模式
    function closeImageMode() {
        document.getElementById('imageOverlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
    }

    window.onload = generateTable;
</script>
</body>
</html>
