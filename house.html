<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #cccccc;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f4f7f6; color: var(--text-main);
            padding: 15px; margin: 0;
        }

        .app-container { max-width: 960px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button {
            border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer;
            font-size: 16px; font-weight: bold; transition: opacity 0.2s; flex: 1; max-width: 200px;
        }
        .btn-calc { background: var(--yung-green); color: white; }
        .btn-save { background: var(--yung-red); color: white; }

        .report-branding { text-align: center; margin-bottom: 30px; }
        .brand-logo-img { height: 65px; margin-bottom: 10px; }
        .report-main-title { color: #1e3a8a; font-size: 28px; font-weight: bold; margin: 0; letter-spacing: 2px; }

        /* 輸入區：電腦兩欄，手機自動變直式 */
        .section-title { font-size: 16px; font-weight: bold; color: var(--yung-green); margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; color: var(--text-sub); margin-bottom: 5px; font-weight: bold; }
        input, select {
            padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 16px; width: 100%; box-sizing: border-box; outline: none;
        }

        /* 💡 關鍵優化：手機版表格自動縮放全覽 💡 */
        .table-responsive { 
            width: 100%; 
            margin-top: 20px; 
            position: relative; 
            overflow: hidden; /* 關閉左右滑動 */
        }
        
        /* 浮水印：單一、中央、0.2 深度 */
        .watermark-layer {
            position: absolute; top: 80px; left: 0; width: 100%; height: calc(100% - 80px);
            pointer-events: none; z-index: 1; opacity: 0.2;
            background-image: url('logo浮水印.png'); background-repeat: no-repeat; 
            background-position: center center; background-size: 350px;
        }

        /* 讓表格預設寬度足夠顯示文字 */
        table { width: 1000px; border-collapse: collapse; position: relative; z-index: 2; background: transparent; transform-origin: top left; }
        th, td { padding: 15px 5px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { color: #475569; font-size: 16px; vertical-align: top; background: #fff; white-space: nowrap; }
        .th-note { display: block; font-size: 12px; color: #94a3b8; font-weight: normal; margin-top: 5px; line-height: 1.4; white-space: nowrap; }
        td { font-size: 20px; font-weight: bold; color: #1e293b; background: rgba(255,255,255,0.7); white-space: nowrap; }
        
        .highlight-row { background-color: rgba(255, 251, 235, 0.9) !important; }
        .col-price { color: #1e3a8a; font-size: 24px; }
        .col-net { color: var(--yung-red); font-size: 24px; }
        
        #exportSummary { display: none; background: #f8fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-size: 16px; line-height: 1.8; border: 1px solid #e2e8f0; }

        .footer-info { margin-top: 40px; padding-top: 20px; border-top: 2px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 14px; color: var(--text-sub); }
        .footer-left strong { font-size: 17px; color: #1e293b; display: block; margin-bottom: 5px; }

        /* 🔥 手機版：上方填寫直式，下方表格自動縮放一目瞭然 🔥 */
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; gap: 20px; }
            input, select { font-size: 20px; padding: 12px; }
            .btn-group { flex-direction: column; }
            button { max-width: 100%; width: 100%; }
            
            /* 💡 自動縮放表格，讓它剛好塞進螢幕寬度 💡 */
            table { 
                transform: scale(calc((100vw - 60px) / 1000)); /* 根據螢幕寬度動態縮放 */
                width: 1000px; 
            }
            .table-responsive { height: auto; min-height: 450px; } /* 給縮放後的表格留空間 */
            .footer-info { flex-direction: column; gap: 10px; text-align: left;}
        }

        /* 儲存圖片時強制橫向 */
        .exporting .control-panel { display: none; }
        .exporting #exportSummary { display: block; }
        .exporting .app-container { width: 1050px; max-width: none; box-shadow: none; padding: 40px; }
        .exporting table { transform: scale(1); width: 1000px; }
    </style>
</head>
<body>

<div class="app-container" id="capture-area">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" onclick="saveAsImage()">📸 儲存報表</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <div class="section-title">取得成本與稅務設定</div>
        <div class="input-grid">
            <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="886"></div>
            <div class="input-group"><label>可認列裝潢成本 (需有發票)</label><input type="number" id="renovationCost" value="0"></div>
            <div class="input-group"><label>買方服務費 (萬)</label><input type="number" id="buyAgencyFee" value="0"></div>
            <div class="input-group"><label>買入時規費 (萬)</label><input type="number" id="buyOtherFees" value="0"></div>
        </div>

        <div class="input-grid">
            <div class="input-group">
                <label>房地合一稅率</label>
                <select id="taxRate">
                    <option value="45" selected>45% (持有2年內)</option>
                    <option value="35">35% (持有2-5年)</option>
                    <option value="20">20% (持有5-10年)</option>
                    <option value="10">10% (自用優惠)</option>
                </select>
            </div>
            <div class="input-group">
                <label>賣方服務費</label>
                <div style="display: flex; gap: 5px;">
                    <select id="agencyFeeType" style="width: 70px;"><option value="percent">%</option><option value="fixed">萬</option></select>
                    <input type="number" id="agencyRate" value="4" style="flex: 1;">
                </div>
            </div>
            <div class="input-group"><label>賣出時規費 (萬)</label><input type="number" id="otherSellingFees" value="0"></div>
        </div>

        <div class="section-title">成交金額對照設定</div>
        <div class="input-grid">
            <div class="input-group"><label>基準價 (萬)</label><input type="number" id="basePrice" value="1500"></div>
            <div class="input-group">
                <label>金額級距</label>
                <select id="stepValue">
                    <option value="1">1萬</option>
                    <option value="5">5萬</option>
                    <option value="10" selected>10萬</option>
                </select>
            </div>
            <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6"></div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="table-responsive">
        <div class="watermark-layer"></div>
        <table id="targetTable">
            <thead>
                <tr>
                    <th style="width:15%;">成交價(萬)</th>
                    <th style="width:17%;">實付費用(萬)<span class="th-note">(仲介費+規費)</span></th>
                    <th style="width:19%;">抵扣費用(萬)<span class="th-note">(擇優:仲介費或最高30萬)</span></th>
                    <th style="width:17%;">課稅所得(萬)<span class="th-note">(賣價-總成本-抵扣)</span></th>
                    <th style="width:17%;">房地合一稅(萬)<span class="th-note">(所得 × 稅率 = 稅金)</span></th>
                    <th style="width:15%;">淨獲利(萬)<span class="th-note">(賣價-總成本-實付-稅)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號
        </div>
        <div class="footer-right">
            製表時間：<span id="dateDisplay"></span><br>
            免責聲明：實際稅額以國稅局核定為準，不負擔擔法律責任。
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const bAgency = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const bOther = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxVal = document.getElementById('taxRate').value;
        const taxRate = parseFloat(taxVal) / 100;
        const agencyType = document.getElementById('agencyFeeType').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const sOther = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        const totalAcq = cost + reno + bAgency + bOther;
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();

        document.getElementById('exportSummary').innerHTML = `
            <strong>報告設定條件：</strong><br>
            取得：買入 ${cost} | 裝潢 ${reno} | 買仲費 ${bAgency} | 規費 ${bOther} (總成本: ${totalAcq.toFixed(1)})<br>
            稅務：稅率 ${taxVal}% | 賣仲費 ${agencyRate}${agencyType==='percent'?'%':'萬'} | 規費 ${sOther}
        `;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        for(let i = 0; i >= -rows + 1; i--) {
            let price = base + (i * step);
            let sellAgency = (agencyType === 'percent') ? (price * agencyRate / 100) : agencyRate;
            let actualSellExp = sellAgency + sOther;
            let deducExp = Math.max(actualSellExp, Math.min(price * 0.03, 30));
            let taxBase = Math.max(0, price - totalAcq - deducExp);
            if (taxVal === '10') taxBase = Math.max(0, taxBase - 400);
            let tax = taxBase * taxRate;
            let net = price - totalAcq - actualSellExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td>${actualSellExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}<br><span style="font-size:12px; color:#008C4A;">${actualSellExp >= Math.min(price * 0.03, 30) ? '[採仲介費]' : '[採免稅額]'}</span></td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    function saveAsImage() {
        generateTable();
        const area = document.getElementById('capture-area');
        area.classList.add('exporting');
        setTimeout(() => {
            html2canvas(area, { scale: 2, backgroundColor: "#ffffff", useCORS: true }).then(canvas => {
                let link = document.createElement('a');
                link.download = `成屋獲利報告.png`;
                link.href = canvas.toDataURL();
                link.click();
                area.classList.remove('exporting');
            });
        }, 500);
    }
    window.onload = generateTable;
</script>
</body>
</html>
