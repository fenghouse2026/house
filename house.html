<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --premium-blue: #1e3a8a;
            --brand-gray: #595757;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f4f7f6; color: var(--brand-gray);
            padding: 0; margin: 0 auto;
            width: 1050px; 
            overscroll-behavior: none; 
        }

        /* 主程式區塊 */
        .app-container { width: 960px; margin: 30px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        
        .btn-group { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 30px; }
        .btn-group button { border: none; padding: 15px 10px; border-radius: 8px; cursor: pointer; font-size: 19px; font-weight: bold; flex: 1; transition: 0.3s; color: white; }
        .btn-group button:active { transform: scale(0.98); }
        .btn-calc { background: var(--yung-green); box-shadow: 0 4px 10px rgba(0, 140, 74, 0.3); }
        .btn-save { background: var(--yung-red); box-shadow: 0 4px 10px rgba(216, 42, 41, 0.4); }
        .btn-pc { background: var(--premium-blue); box-shadow: 0 4px 10px rgba(30, 58, 138, 0.4); }

        .report-branding { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--yung-red); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo-img { height: 80px; }
        .report-main-title { color: var(--yung-green); font-size: 36px; font-weight: bold; margin: 0; letter-spacing: 2px; }

        /* 🔥 完全沿用您的控制面板設計 🔥 */
        .control-panel { background: #fdfdfd; padding: 25px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 30px; }
        .control-panel h2 { text-align: center; color: var(--brand-gray); font-size: 22px; border-bottom: 1px dashed #ccc; padding-bottom: 15px; margin-top: 0; margin-bottom: 25px; }
        
        /* 配合 1050px 鎖定，設定為兩大欄，確保手機上格子夠大 */
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: bold; margin-bottom: 8px; font-size: 16px; color: #555; }
        .field-note { font-weight: normal; font-size: 13px; color: #888; }
        input, select { padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 20px; box-sizing: border-box; background-color: #fff; outline: none; }
        input:focus, select:focus { border-color: var(--yung-green); box-shadow: 0 0 5px rgba(0,140,74,0.2); }

        .report-area { position: relative; margin-top: 10px; border-top: 8px solid #fdb913; padding-top: 30px;}
        .watermark-overlay {
            position: absolute; top: 120px; left: 0; width: 100%; height: calc(100% - 120px);
            pointer-events: none; z-index: 1; opacity: 0.2;
            background-image: url('logo浮水印.png');
            background-repeat: no-repeat; background-position: center; background-size: 450px auto;
        }

        table { width: 100%; border-collapse: collapse; position: relative; z-index: 2; table-layout: fixed; }
        th, td { padding: 18px 5px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { color: var(--brand-gray); font-size: 18px; font-weight: bold; border-bottom: 2px solid #a0aec0; border-top: 2px solid #a0aec0; background: #fff; }
        .th-note { display: block; font-size: 13px; color: #94a3b8; margin-top: 8px; font-weight: normal; }
        td { font-size: 24px; font-weight: bold; color: #1e293b; white-space: nowrap; background: rgba(255,255,255,0.7); }
        
        .highlight-row td { background-color: #fff4b3 !important; }
        .col-price { color: #2c5282; font-size: 28px; }
        .col-net { color: var(--yung-red); font-size: 28px; }
        
        #exportSummary { display: none; background: #f9f9f9; padding: 25px; border-radius: 6px; border-left: 6px solid var(--yung-green); margin-bottom: 25px; font-size: 20px; line-height: 1.8; }

        .footer-info { margin-top: 50px; padding-top: 25px; border-top: 1px dashed #ccc; display: flex; justify-content: space-between; font-size: 16px; color: #777; }
        .footer-left strong { font-size: 20px; color: #1e3a8a; display: block; margin-bottom: 8px; }

        /* 擷取圖片時的隱藏與格式 */
        .exporting .control-panel, .exporting .btn-group { display: none; }
        .exporting #exportSummary { display: block; }
        .exporting { box-shadow: none; border: none; margin: 0; }

        /* 🔥 手機長按存圖 / 備用方案區塊 🔥 */
        #imageOverlay { display: none; width: 1050px; background: #333333; min-height: 100vh; padding-bottom: 50px; }
        .overlay-header { background: #1e3a8a; color: white; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .overlay-header span { font-size: 24px; font-weight: bold; }
        
        .header-btns { display: flex; gap: 20px; align-items: center; }
        .btn-download-fallback { background: var(--yung-red); color: white; width: auto; padding: 15px 30px; font-size: 24px; border-radius: 50px; cursor: pointer; border: 4px solid #ffffff; font-weight: 900; }
        .btn-back-img { background: white; color: #1e3a8a; width: auto; padding: 15px 30px; font-size: 22px; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; }
        
        .image-wrapper { position: relative; width: 960px; margin: 40px auto 0; border: 6px dashed #ffffff; padding: 10px; background: #ffffff; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 12px; }
        #generatedImg { display: block; width: 100%; height: auto; pointer-events: auto; border-radius: 8px; }

        .press-hint {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(216, 42, 41, 0.95); color: #ffffff;
            font-size: 75px; font-weight: 900; padding: 50px 100px; border-radius: 100px;
            border: 12px solid #ffffff; pointer-events: none; z-index: 50;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6); white-space: nowrap;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3); animation: pulseHint 1.5s infinite;
        }

        @keyframes pulseHint {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(216, 42, 41, 0.9); }
            70% { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 0 0 45px rgba(216, 42, 41, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(216, 42, 41, 0); }
        }

        /* 儲存成功的 Toast 提示 */
        #toastMessage {
            visibility: hidden; min-width: 300px; background-color: var(--yung-green); color: #fff;
            text-align: center; border-radius: 50px; padding: 20px; position: fixed; z-index: 9999;
            left: 50%; transform: translateX(-50%); bottom: 20px; font-size: 24px; font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.5s, bottom 0.5s;
            border: 3px solid #ffffff;
        }
        #toastMessage.show { visibility: visible; opacity: 1; bottom: 60px; }
    </style>
</head>
<body>

<div id="toastMessage">✅ 報表已成功儲存！</div>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" id="btnSave" onclick="shareOrDownload()">📤 手機分享/儲存</button>
        <button class="btn-pc" id="btnPc" onclick="directDownloadPC()">💻 電腦版下載</button>
    </div>

    <div class="report-branding">
        <div class="brand-logo-container">
            <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        </div>
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <h2>一、成屋專屬參數設定</h2>
        
        <div class="input-grid">
            <div class="input-group">
                <label>買入總價 (萬元)</label>
                <input type="number" id="costPrice" value="886" step="1">
            </div>
            <div class="input-group">
                <label>可列舉裝潢成本(有發票) (萬元)</label>
                <input type="number" id="renovationCost" value="0" step="1" title="需具備合法發票等憑證">
            </div>
            <div class="input-group">
                <label>購買時仲介費 (萬元)</label>
                <input type="number" id="buyAgencyFee" value="0" step="0.1">
            </div>
            <div class="input-group">
                <label>購買時代書費契稅等 (萬元)</label>
                <input type="number" id="buyOtherFees" value="0" step="0.1">
            </div>
            <div class="input-group">
                <label>土地漲價總數額 (萬元) <span class="field-note">(扣減稅基用)</span></label>
                <input type="number" id="landIncrement" value="0" step="1">
            </div>
        </div>

        <div class="input-grid" style="border-top: 1px dashed #ccc; padding-top: 25px; margin-top: 5px;">
            <div class="input-group">
                <label>房地合一稅率 (%)</label>
                <select id="taxRate">
                    <option value="45" selected>45% (持有2年內)</option>
                    <option value="35">35% (持有2-5年)</option>
                    <option value="20">20% (持有5-10年)</option>
                    <option value="15">15% (持有10年以上)</option>
                    <option value="10">10% (自用滿6年優惠)</option>
                </select>
            </div>
            <div class="input-group">
                <label>賣方仲介費 (%)</label>
                <input type="number" id="agencyRate" value="4" step="0.1">
            </div>
            <div class="input-group">
                <label>賣方其他規費 (萬元) <span class="field-note">(代書費等)</span></label>
                <input type="number" id="otherSellingFees" value="0" step="0.1">
            </div>
        </div>
        
        <div class="input-grid" style="border-top: 1px dashed #ccc; padding-top: 25px; margin-top: 5px;">
            <div class="input-group">
                <label>基準成交價 (萬元)</label>
                <input type="number" id="basePrice" value="1500" step="1">
            </div>
            <div class="input-group">
                <label>級距單位 (萬元)</label>
                <select id="stepValue">
                    <option value="1">1萬</option>
                    <option value="5">5萬</option>
                    <option value="10" selected>10萬</option>
                    <option value="20">20萬</option>
                    <option value="50">50萬</option>
                </select>
            </div>
            <div class="input-group">
                <label>往下延展筆數</label>
                <input type="number" id="rowCount" value="8" min="1" step="1">
            </div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <div class="watermark-overlay"></div>
        <table>
            <thead>
                <tr>
                    <th style="width:15%;">成交價(萬)</th>
                    <th style="width:17%;">實付費用(萬)<span class="th-note">(仲介費+規費)</span></th>
                    <th style="width:20%;">抵扣費用(萬)<span class="th-note">(擇優:仲介費或最高30萬)</span></th>
                    <th style="width:16%;">課稅所得(萬)<span class="th-note">(賣價-總成本-抵扣)</span></th>
                    <th style="width:16%;">房地合一稅(萬)<span class="th-note">(所得 × 稅率 = 稅金)</span></th>
                    <th style="width:16%;">淨獲利(萬)<span class="th-note">(賣價-總成本-實付-稅)</span></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號
        </div>
        <div style="text-align:right;">
            製表時間：<span id="dateDisplay"></span><br>
            <strong>免責聲明：實際稅額以國稅局核定為準。</strong>
        </div>
    </div>
</div>

<div id="imageOverlay">
    <div class="overlay-header">
        <span>✅ 圖片已生成 </span>
        <div class="header-btns">
            <button class="btn-download-fallback" onclick="downloadFallbackImage()">💾 點我直接下載</button>
            <button class="btn-back-img" onclick="closeImageMode()">⬅️ 返回修改</button>
        </div>
    </div>
    
    <div class="image-wrapper">
        <div class="press-hint">👇 (大力的壓住我儲存) 👇</div>
        <img id="generatedImg" alt="成屋獲利報告">
    </div>
</div>

<script>
    function showSuccessToast(message = "✅ 報表已成功處理！") {
        const toast = document.getElementById("toastMessage");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function generateTable() {
        // 取值並計算 (已加入土地漲價總數額)
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const buyAgencyFee = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const buyOtherFees = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const landIncrement = parseFloat(document.getElementById('landIncrement').value) || 0;
        
        const taxRateVal = document.getElementById('taxRate').value;
        const taxRate = parseFloat(taxRateVal) / 100;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const sOther = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        
        const base = parseFloat(document.getElementById('basePrice').value) || 0;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const rows = parseInt(document.getElementById('rowCount').value) || 8;

        const totalAcq = cost + reno + buyAgencyFee + buyOtherFees;
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();

        document.getElementById('exportSummary').innerHTML = `
            <strong>當前報告設定條件：</strong><br>
            取得成本：買入 ${cost} 萬 | 裝潢 ${reno} 萬 | 買方仲介費 ${buyAgencyFee} 萬 | 買入規費 ${buyOtherFees} 萬 (總: ${totalAcq.toFixed(1)})<br>
            稅務設定：土增稅 ${landIncrement} 萬 | 稅率 ${taxRateVal}% | 賣方仲介費 ${agencyRate}% | 賣出規費 ${sOther} 萬
        `;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        for(let i = 0; i >= -rows + 1; i--) {
            let price = base + (i * step);
            // 賣方仲介費直接用 % 計算
            let sellAgency = price * (agencyRate / 100);
            let actualSellExp = sellAgency + sOther;
            let deducExp = Math.max(actualSellExp, Math.min(price * 0.03, 30));
            
            // 稅基計算：扣除總成本、抵扣額、以及土地漲價總數額
            let taxBase = price - totalAcq - deducExp - landIncrement;
            if (taxRateVal === '10') {
                taxBase = Math.max(0, taxBase - 400); // 扣減 400 萬免稅額
            } else {
                taxBase = Math.max(0, taxBase);
            }
            
            let tax = taxBase * taxRate;
            let net = price - totalAcq - actualSellExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td>${actualSellExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}<br><span style="font-size:12px; color:#008C4A; font-weight:bold;">${actualSellExp >= Math.min(price * 0.03, 30) ? '[採仲介費]' : '[採免稅額]'}</span></td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    // 電腦版一鍵下載
    async function directDownloadPC() {
        generateTable();
        const mainApp = document.getElementById('main-app');
        const btnPc = document.getElementById('btnPc');
        const originalText = btnPc.innerHTML;
        
        btnPc.innerHTML = "⏳ 處理中...";
        mainApp.classList.add('exporting'); 
        await new Promise(r => setTimeout(r, 150)); 
        
        try {
            const canvas = await html2canvas(mainApp, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
            mainApp.classList.remove('exporting');
            btnPc.innerHTML = originalText;
            
            const imgData = canvas.toDataURL("image/png");
            let link = document.createElement('a');
            link.download = `成屋獲利報告_${new Date().getTime()}.png`;
            link.href = imgData;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showSuccessToast("✅ 報表已成功下載至電腦！");

        } catch (error) {
            console.error(error);
            mainApp.classList.remove('exporting');
            btnPc.innerHTML = originalText;
            alert('下載失敗，請稍後再試！');
        }
    }

    // 手機分享 / 儲存功能
    async function shareOrDownload() {
        generateTable();
        const mainApp = document.getElementById('main-app');
        const btnSave = document.getElementById('btnSave');
        const originalText = btnSave.innerHTML;
        
        btnSave.innerHTML = "⏳ 處理中...";
        mainApp.classList.add('exporting'); 
        await new Promise(r => setTimeout(r, 150));

        try {
            const canvas = await html2canvas(mainApp, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
            mainApp.classList.remove('exporting');
            
            canvas.toBlob(async (blob) => {
                const file = new File([blob], '成屋獲利報告.png', { type: 'image/png' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({ files: [file], title: '成屋獲利對照報告' });
                        btnSave.innerHTML = originalText;
                        showSuccessToast("✅ 已成功分享或儲存！");
                    } catch (err) {
                        showFallbackOverlay(canvas.toDataURL("image/png"));
                        btnSave.innerHTML = originalText;
                    }
                } else {
                    showFallbackOverlay(canvas.toDataURL("image/png"));
                    btnSave.innerHTML = originalText;
                }
            }, 'image/png');

        } catch (error) {
            console.error(error);
            mainApp.classList.remove('exporting');
            btnSave.innerHTML = originalText;
            alert('產生圖片發生錯誤，請稍後再試！');
        }
    }

    function showFallbackOverlay(imgData) {
        const mainApp = document.getElementById('main-app');
        document.getElementById('generatedImg').src = imgData;
        mainApp.style.display = 'none';
        document.getElementById('imageOverlay').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function downloadFallbackImage() {
        const img = document.getElementById('generatedImg');
        if (!img.src) return;
        let link = document.createElement('a');
        link.download = `成屋獲利報告_${new Date().getTime()}.png`;
        link.href = img.src;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showSuccessToast("✅ 報表已成功下載！");
    }

    function closeImageMode() {
        document.getElementById('imageOverlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
    }

    window.onload = generateTable;
</script>
</body>
</html>
