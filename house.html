<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050, user-scalable=no">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --brand-gray: #595757;
            --border-color: #cccccc;
            --flat-green: #27ae60;
            --flat-blue: #2980b9;
            --flat-dark: #34495e;
            --flat-text: #ffffff;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f4f7f6; color: var(--brand-gray);
            padding: 0; margin: 0 auto;
            width: 1050px; 
            overscroll-behavior: none; 
        }

        .app-container { width: 960px; margin: 30px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        
        /* 按鈕區 - 固定高度與比例 */
        .btn-group { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 30px; background: #fcfcfc; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        .btn-group button { border: none; height: 70px; border-radius: 6px; cursor: pointer; font-size: 24px; font-weight: bold; flex: 1; color: var(--flat-text); }
        .btn-calc { background-color: var(--flat-green); }
        .btn-save { background-color: var(--flat-blue); }
        .btn-pc { background-color: var(--flat-dark); }

        /* 標題區 */
        .report-branding { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--yung-red); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo-img { height: 80px; }
        .report-main-title { color: var(--yung-green); font-size: 36px; font-weight: bold; margin: 0; }

        /* 設定面板 */
        .control-panel { background: #fdfdfd; padding: 30px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 30px; }
        .control-panel h2 { text-align: center; font-size: 32px; border-bottom: 2px dashed #ccc; padding-bottom: 20px; margin-top: 0; margin-bottom: 30px; font-weight: 900; }
        
        /* 網格系統 - 固定兩列比例 */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 900; margin-bottom: 10px; font-size: 22px; color: #444; }
        
        input, select { 
            padding: 14px 18px; border: 2px solid var(--border-color); border-radius: 8px; 
            font-size: 28px; font-weight: bold; color: #1e3a8a; outline: none;
            -webkit-text-size-adjust: 100%; /* 防止字體自動縮放 */
        }

        /* 🔥 仲介費專區 - 鎖定比例不變動 🔥 */
        .special-agency-box {
            background: #f0f7f4; padding: 25px; border-radius: 12px;
            border: 2px solid var(--yung-green); margin: 20px 0;
        }
        .special-agency-box label { display: block; font-size: 26px; font-weight: 900; color: var(--yung-green); margin-bottom: 15px; }
        .agency-flex-container { display: flex; gap: 15px; align-items: center; }
        .agency-mode-select { flex: 0 0 450px; height: 75px; background: var(--yung-green); color: white; border: none; font-size: 26px; }
        .agency-input-wrapper { flex: 1; position: relative; display: flex; align-items: center; }
        .agency-input-wrapper input { width: 100%; height: 75px; font-size: 36px; padding-right: 60px; }
        .unit-float { position: absolute; right: 20px; font-size: 32px; font-weight: 900; color: var(--yung-green); }

        /* 報表表格 */
        .report-area { border-top: 8px solid #fdb913; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 18px 5px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { font-size: 18px; font-weight: bold; background: #fff; border-top: 2px solid #a0aec0; border-bottom: 2px solid #a0aec0; }
        td { font-size: 24px; font-weight: bold; color: #1e293b; }
        .highlight-row td { background-color: #fff4b3 !important; }
        .col-price { color: #2c5282; font-size: 28px; }
        .col-net { color: var(--yung-red); font-size: 28px; }

        #exportSummary { display: none; background: #f9f9f9; padding: 20px; border-radius: 6px; border-left: 6px solid var(--yung-green); margin-bottom: 20px; font-size: 22px; line-height: 1.6; }
        .footer-info { margin-top: 40px; padding-top: 20px; border-top: 1px dashed #ccc; display: flex; justify-content: space-between; font-size: 16px; color: #777; }

        /* 匯出模式樣式 */
        .exporting .control-panel, .exporting .btn-group { display: none; }
        .exporting #exportSummary { display: block; }

        #toastMessage {
            visibility: hidden; min-width: 300px; background-color: var(--flat-green); color: #fff;
            text-align: center; border-radius: 8px; padding: 20px; position: fixed; z-index: 9999;
            left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 24px; font-weight: bold;
        }
        #toastMessage.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="toastMessage">✅ 處理成功！</div>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" onclick="shareOrDownload()">📤 分享 / 儲存報表</button>
        <button class="btn-pc" onclick="directDownloadPC()">💻 電腦版下載</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <h2>一、成屋專屬參數設定</h2>
        
        <div class="input-grid">
            <div class="input-group"><label>買入總價 (萬元)</label><input type="number" id="costPrice" value="886"></div>
            <div class="input-group"><label>可列舉裝潢成本 (萬元)</label><input type="number" id="renovationCost" value="0"></div>
            <div class="input-group"><label>購買時仲介費 (萬元)</label><input type="number" id="buyAgencyFee" value="0"></div>
            <div class="input-group"><label>購買時代書費等規費 (萬元)</label><input type="number" id="buyOtherFees" value="0"></div>
        </div>
        
        <div class="input-grid" style="border-top: 2px dashed #ccc; padding-top: 25px;">
            <div class="input-group">
                <label>房地合一稅率 (%)</label>
                <select id="taxRate">
                    <option value="45" selected>45% (持有2年內)</option>
                    <option value="35">35% (持有2-5年)</option>
                    <option value="20">20% (持有5-10年)</option>
                    <option value="15">15% (持有10年以上)</option>
                    <option value="10">10% (自用滿6年優惠)</option>
                </select>
            </div>
            <div class="input-group"><label>賣方其他規費 (萬元)</label><input type="number" id="otherSellingFees" value="0"></div>
        </div>

        <div class="special-agency-box">
            <label>二、賣方仲介費設定</label>
            <div class="agency-flex-container">
                <select id="agencyMode" class="agency-mode-select" onchange="updateAgencyUnit()">
                    <option value="percent">按成交總價比例 (%)</option>
                    <option value="fixed">按議定固定金額 (萬元)</option>
                </select>
                <div class="agency-input-wrapper">
                    <input type="number" id="agencyValue" value="4">
                    <span id="agencyUnit" class="unit-float">%</span>
                </div>
            </div>
        </div>

        <div class="input-grid" style="border-top: 2px dashed #ccc; padding-top: 25px;">
            <div class="input-group"><label>基準成交價 (萬元)</label><input type="number" id="basePrice" value="1500"></div>
            <div class="input-group">
                <label>級距單位 (萬元)</label>
                <select id="stepValue">
                    <option value="1">1萬</option>
                    <option value="5">5萬</option>
                    <option value="10" selected>10萬</option>
                    <option value="20">20萬</option>
                </select>
            </div>
            <div class="input-group"><label>往下延展筆數</label><input type="number" id="rowCount" value="8"></div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <table>
            <thead>
                <tr>
                    <th style="width:15%;">成交價</th>
                    <th style="width:17%;">實付費用</th>
                    <th style="width:20%;">抵扣費用</th>
                    <th style="width:16%;">課稅所得</th>
                    <th style="width:16%;">房地合一稅</th>
                    <th style="width:16%;">淨獲利</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <div><strong>永義房屋斗六成功莊敬加盟店</strong><br>承峰不動產仲介有限公司</div>
        <div style="text-align:right;">製表時間：<span id="dateDisplay"></span><br><strong>實際稅額以國稅局核定為準。</strong></div>
    </div>
</div>

<script>
    function updateAgencyUnit() {
        const mode = document.getElementById('agencyMode').value;
        const unitLabel = document.getElementById('agencyUnit');
        const input = document.getElementById('agencyValue');
        if (mode === 'percent') {
            unitLabel.innerText = '%';
            if (input.value > 10) input.value = 4;
        } else {
            unitLabel.innerText = '萬';
            if (input.value < 10) input.value = 15;
        }
        generateTable();
    }

    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const buyAgencyFee = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const buyOtherFees = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxRateVal = document.getElementById('taxRate').value;
        const taxRate = parseFloat(taxRateVal) / 100;
        const agencyMode = document.getElementById('agencyMode').value;
        const agencyValue = parseFloat(document.getElementById('agencyValue').value) || 0;
        const sOther = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const rows = parseInt(document.getElementById('rowCount').value) || 8;

        const totalAcq = cost + reno + buyAgencyFee + buyOtherFees;
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();

        const agencyDisplay = (agencyMode === 'percent') ? `${agencyValue}%` : `${agencyValue} 萬`;

        document.getElementById('exportSummary').innerHTML = `
            <strong>當前報告設定條件：</strong><br>
            取得成本：買入 ${cost} 萬 | 裝潢 ${reno} 萬 | 買方費 ${buyAgencyFee} 萬 | 規費 ${buyOtherFees} 萬 (總: ${totalAcq.toFixed(1)})<br>
            稅務設定：稅率 ${taxRateVal}% | 賣方仲介費 ${agencyDisplay} | 賣出規費 ${sOther} 萬
        `;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i = 0; i >= -rows + 1; i--) {
            let price = base + (i * step);
            let sellAgency = (agencyMode === 'percent') ? (price * (agencyValue / 100)) : agencyValue;
            let actualSellExp = sellAgency + sOther;
            let deducExp = Math.max(actualSellExp, Math.min(price * 0.03, 30));
            let taxBase = price - totalAcq - deducExp;
            
            if (taxRateVal === '10') taxBase = Math.max(0, taxBase - 400); 
            else taxBase = Math.max(0, taxBase);
            
            let tax = taxBase * taxRate;
            let net = price - totalAcq - actualSellExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td>${actualSellExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}</td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    // 其它功能保持原樣
    function showSuccessToast(message) {
        const toast = document.getElementById("toastMessage");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 3000);
    }

    async function directDownloadPC() {
        generateTable();
        const mainApp = document.getElementById('main-app');
        mainApp.classList.add('exporting'); 
        await new Promise(r => setTimeout(r, 200)); 
        const canvas = await html2canvas(mainApp, { scale: 2, backgroundColor: "#ffffff" });
        mainApp.classList.remove('exporting');
        const imgData = canvas.toDataURL("image/png");
        let link = document.createElement('a');
        link.download = `成屋獲利報告.png`;
        link.href = imgData;
        link.click();
        showSuccessToast("✅ 下載成功！");
    }

    async function shareOrDownload() {
        generateTable();
        const mainApp = document.getElementById('main-app');
        mainApp.classList.add('exporting'); 
        await new Promise(r => setTimeout(r, 200));
        const canvas = await html2canvas(mainApp, { scale: 2, backgroundColor: "#ffffff" });
        mainApp.classList.remove('exporting');
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '成屋獲利報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '成屋獲利報告' });
            } else {
                const url = URL.createObjectURL(blob);
                let link = document.createElement('a');
                link.download = `成屋獲利報告.png`;
                link.href = url;
                link.click();
            }
            showSuccessToast("✅ 處理完成！");
        }, 'image/png');
    }

    window.onload = generateTable;
</script>
</body>
</html>
