<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成屋獲利旗艦報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-yellow: #fdb913; 
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --text-main: #1e293b;
            --text-sub: #94a3b8;
            --premium-blue: #0f172a; 
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f8fafc;
            color: var(--text-main);
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        .app-container { max-width: 850px; margin: auto; }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }

        button {
            border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-size: 14px; font-weight: 700; transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-calc { background: var(--yung-green); color: white; }
        .btn-save { background: var(--yung-red); color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        #full-report-area {
            background: #ffffff; padding: 70px 80px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            position: relative; overflow: hidden; 
        }

        #full-report-area::before {
            content: ""; position: absolute; top: 0; left: 0; width: 6px; height: 100%;
            background: linear-gradient(to bottom, var(--yung-yellow), var(--yung-green));
        }

        .watermark-overlay { position: absolute; top: 0; left: 0; right: right: 0; bottom: 0; z-index: 10; pointer-events: none; }
        .wm-logo { position: absolute; top: 75%; left: 50%; transform: translate(-50%, -50%); width: 520px; opacity: 0.035; }

        .report-branding { display: flex; flex-direction: column; align-items: center; margin-bottom: 50px; text-align: center; }
        .brand-logo-img { height: 75px; margin-bottom: 15px; }
        .report-main-title { color: var(--premium-blue); font-size: 28px; font-weight: 900; letter-spacing: 4px; margin: 0; }

        .control-panel { margin-bottom: 40px; }
        .input-section { margin-bottom: 35px; }
        
        .section-title {
            font-size: 12px; font-weight: 800; color: var(--yung-green);
            margin-bottom: 20px; letter-spacing: 1px; display: flex; align-items: center;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #f1f5f9; margin-left: 10px; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px 35px; }

        .input-group label { 
            font-weight: 700; font-size: 11px; color: var(--text-sub); 
            margin-bottom: 4px; display: block;
        }

        input, select {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            border-radius: 0;
            padding: 4px 0px;
            height: 32px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-bottom: 2px solid var(--yung-green);
            outline: none;
        }

        /* 🔥 修正：確保輸出時一定會顯示的摘要樣式 🔥 */
        #textSummary {
            background: #fafafa; 
            border-radius: 10px; 
            padding: 25px;
            font-size: 15px; 
            line-height: 1.8; 
            margin-bottom: 35px;
            display: none; /* 平常操作隱藏 */
            border: 1px solid #f0f0f0;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 6px; margin-top: 15px; }
        th { color: #cbd5e1; font-size: 11px; font-weight: 800; padding: 10px; text-align: center; }
        td { 
            padding: 18px 10px; text-align: center; background: #fff;
            border-top: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc;
        }
        td:first-child { border-left: 1px solid #f8fafc; border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid #f8fafc; border-radius: 0 12px 12px 0; }
        
        .unit-label { font-size: 10px; color: #94a3b8; font-weight: 600; margin-left: 2px; }
        .col-price { color: var(--premium-blue); font-weight: 900; font-size: 18px; }
        .col-net-profit { color: var(--yung-red) !important; font-weight: 900 !important; font-size: 18px; }
        
        .highlight-row td { background: #fffbeb !important; border-color: #fef3c7 !important; }

        /* A4 模式 CSS 優先權優化 */
        .export-mode { width: 850px !important; padding: 70px 80px !important; border-radius: 0 !important; }
        .export-mode .input-section { display: none !important; }
        .export-mode #textSummary { display: block !important; visibility: visible !important; }
        .export-mode .wm-logo { top: 60%; width: 550px; }

        .footer-info {
            margin-top: 60px; padding-top: 30px; border-top: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: flex-end;
            color: #94a3b8; font-size: 12px; line-height: 1.8;
        }
        .footer-disclaimer { text-align: right; max-width: 400px; }
        .disclaimer-text { font-size: 11px; opacity: 0.8; margin-top: 4px; }

        @media (max-width: 600px) {
            #full-report-area:not(.export-mode) { padding: 40px 20px; }
            .input-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .grid-three { grid-template-columns: repeat(3, 1fr) !important; gap: 10px !important;}
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算數據</button>
        <button class="btn-save" onclick="saveAsImage()">📸 儲存 A4 質感報表</button>
    </div>

    <div id="full-report-area">
        <div class="watermark-overlay">
            <img src="logo浮水印.png" class="wm-logo" alt="">
        </div>

        <div class="report-branding">
            <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
            <h1 class="report-main-title">成屋獲利對照報告</h1>
        </div>

        <div class="control-panel">
            <div id="textSummary">
                <div style="font-size: 14px; color: var(--yung-green); font-weight: 800; margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">報告設定條件</div>
                買入總價 <span id="s_cost" style="color:var(--premium-blue); font-weight:900;">-</span> 萬 | 
                裝潢成本 <span id="s_reno" style="color:var(--premium-blue); font-weight:900;">-</span> 萬 |
                房地合一稅率 <span id="s_tax" style="color:var(--yung-red); font-weight:900;">-</span> <br>
                買方服務費 <span id="s_buyAgency">-</span> 萬 | 
                買方規費 <span id="s_buyOther">-</span> 萬 | 
                賣方服務費 <span id="s_sellAgency">-</span> <span id="s_sellAgencyType">-</span> | 
                賣方其他規費 <span id="s_sellOther">-</span> 萬
            </div>

            <div class="input-section">
                <div class="section-title">取得成本設定</div>
                <div class="input-grid">
                    <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="1000"></div>
                    <div class="input-group"><label>裝潢成本 (萬)</label><input type="number" id="renovationCost" value="50"></div>
                    <div class="input-group"><label>買方服務費 (萬)</label><input type="number" id="buyAgencyFee" value="20"></div>
                    <div class="input-group"><label>代書規費 (萬)</label><input type="number" id="buyOtherFees" value="10"></div>
                </div>
            </div>

            <div class="input-section">
                <div class="section-title">銷售與稅務參數</div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>房地合一稅率</label>
                        <select id="taxRate">
                            <option value="45">45% (持有2年內)</option>
                            <option value="35" selected>35% (持有2-5年)</option>
                            <option value="20">20% (持有5-10年)</option>
                            <option value="15">15% (持有10年以上)</option>
                            <option value="10">10% (自用優惠)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>賣方仲介服務費</label>
                        <div style="display: flex; gap: 10px;">
                            <select id="agencyFeeType" style="flex: 0 0 30%; border-bottom: 1px solid var(--border-color);">
                                <option value="percent">%</option>
                                <option value="fixed">萬</option>
                            </select>
                            <input type="number" id="agencyRate" value="4" style="flex: 1;">
                        </div>
                    </div>
                    <div class="input-group"><label>賣方其他規費 (萬)</label><input type="number" id="otherSellingFees" value="0"></div>
                </div>
            </div>

            <div class="input-section" style="margin-bottom: 0;">
                <div class="section-title">表格顯示範圍</div>
                <div class="input-grid grid-three" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="input-group"><label>基準成交價 (萬)</label><input type="number" id="basePrice" value="1500"></div>
                    <div class="input-group">
                        <label>級距單位</label>
                        <select id="stepValue">
                            <option value="5">5萬</option><option value="10" selected>10萬</option><option value="20">20萬</option>
                        </select>
                    </div>
                    <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="8"></div>
                </div>
            </div>
        </div>

        <div class="capture-area">
            <div style="text-align:center; margin-bottom:25px;">
                <div style="font-size:11px; color:var(--text-sub); background:#f8fafc; border:1px solid #f1f5f9; display:inline-block; padding:5px 18px; border-radius:50px; font-weight:700;">
                    💡 系統已自動擇優認列抵扣費用
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:18%;">成交價</th>
                        <th style="width:16%;">實付費用</th>
                        <th style="width:16%;">抵扣費用</th>
                        <th style="width:17%;">課稅所得</th>
                        <th style="width:17%;">房地稅額</th>
                        <th style="width:16%;">淨獲利</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
            
            <div class="footer-info">
                <div class="footer-branch">
                    <strong style="color:var(--premium-blue); font-size: 14px;">永義房屋斗六成功莊敬加盟店</strong><br>
                    <span>承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號</span>
                </div>
                <div class="footer-disclaimer">
                    <div>製表時間：<span id="dateDisplay"></span></div>
                    <div class="disclaimer-text">
                        <strong>免責聲明：</strong>實際稅額以國稅局核定為準，計算錯誤時不負擔任何責任。
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🔥 全域同步函數：確保數據隨時抓取最新值 🔥
    function syncDataToSummary() {
        document.getElementById('s_cost').innerText = document.getElementById('costPrice').value || 0;
        document.getElementById('s_reno').innerText = document.getElementById('renovationCost').value || 0;
        document.getElementById('s_buyAgency').innerText = document.getElementById('buyAgencyFee').value || 0;
        document.getElementById('s_buyOther').innerText = document.getElementById('buyOtherFees').value || 0;
        
        const taxSelect = document.getElementById('taxRate');
        document.getElementById('s_tax').innerText = taxSelect.options[taxSelect.selectedIndex].text;
        
        document.getElementById('s_sellAgency').innerText = document.getElementById('agencyRate').value || 0;
        document.getElementById('s_sellAgencyType').innerText = (document.getElementById('agencyFeeType').value === 'percent' ? '%' : '萬');
        document.getElementById('s_sellOther').innerText = document.getElementById('otherSellingFees').value || 0;
    }

    function generateTable() {
        const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const buyAgency = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const buyOther = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxSelect = document.getElementById('taxRate');
        const taxRate = parseFloat(taxSelect.value) / 100 || 0;
        const isSelfUse = (taxSelect.value === '10');
        const agencyFeeType = document.getElementById('agencyFeeType').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const otherSellFee = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const basePrice = parseFloat(document.getElementById('basePrice').value) || 0;
        const stepValue = parseFloat(document.getElementById('stepValue').value) || 0;
        const rowCount = parseInt(document.getElementById('rowCount').value) || 8;

        // 執行同步
        syncDataToSummary();

        const today = new Date();
        document.getElementById('dateDisplay').innerText = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        const totalAcquisitionCost = costPrice + reno + buyAgency + buyOther;

        for(let i = 0; i >= -rowCount; i--) {
            let currentPrice = basePrice + (i * stepValue);
            let actualSellingExp = (agencyFeeType === 'percent' ? (currentPrice * agencyRate / 100) : agencyRate) + otherSellFee;
            let statExp = Math.min(currentPrice * 0.03, 30);
            let deducExp = Math.max(actualSellingExp, statExp);
            let taxBase = Math.max(0, currentPrice - totalAcquisitionCost - deducExp);
            if (isSelfUse) taxBase = Math.max(0, taxBase - 400);
            let tax = taxBase * taxRate;
            let netProfit = currentPrice - totalAcquisitionCost - actualSellingExp - tax;

            let tr = document.createElement('tr');
            if (i === 0) tr.className = 'highlight-row';
            tr.innerHTML = `
                <td class="col-price">${currentPrice}<span class="unit-label">萬</span></td>
                <td>${actualSellingExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}</td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net-profit">${netProfit.toFixed(1)}<span class="unit-label">萬</span></td>
            `;
            tbody.appendChild(tr);
        }
    }

    function saveAsImage() {
        document.querySelectorAll('input').forEach(i => i.blur());
        
        // 📸 關鍵動作：截圖前再次強制生成與同步 📸
        generateTable();
        
        const area = document.getElementById('full-report-area');
        area.classList.add('export-mode');

        setTimeout(() => {
            html2canvas(area, {
                scale: 3,
                backgroundColor: "#ffffff",
                useCORS: true,
                width: area.offsetWidth,
                height: area.offsetHeight 
            }).then(canvas => {
                let link = document.createElement('a');
                link.download = `獲利報告_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                area.classList.remove('export-mode');
            }).catch(() => area.classList.remove('export-mode'));
        }, 500); 
    }
    window.onload = generateTable;
</script>
</body>
</html>
