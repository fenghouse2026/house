<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-yellow: #fdb913; 
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --text-main: #1e293b;
            --text-sub: #475569;
            --premium-blue: #1e3a8a; 
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f8fafc; color: var(--text-main);
            padding: 20px; margin: 0; min-height: 100vh;
        }

        .app-container { max-width: 1000px; margin: auto; }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button {
            border: none; padding: 14px 25px; border-radius: 50px; cursor: pointer;
            font-size: 16px; font-weight: 700; transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; max-width: 250px;
        }
        .btn-calc { background: var(--yung-green); color: white; }
        .btn-save { background: var(--yung-red); color: white; }

        #full-report-area {
            background: #ffffff; padding: 50px; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); position: relative; overflow: hidden;
            min-width: 920px; 
        }
        #full-report-area::before {
            content: ""; position: absolute; top: 0; left: 0; width: 8px; height: 100%;
            background: linear-gradient(to bottom, var(--yung-yellow), var(--yung-green));
        }

        .scroll-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; border-radius: 24px;}

        .report-branding { text-align: center; margin-bottom: 35px; }
        .brand-logo-img { height: 80px; margin-bottom: 15px; }
        .report-main-title { color: var(--premium-blue); font-size: 36px; font-weight: 900; letter-spacing: 4px; margin: 0; }

        .control-panel { margin-bottom: 40px; }
        .input-section { margin-bottom: 35px; }
        .section-title {
            font-size: 15px; font-weight: 800; color: var(--yung-green);
            margin-bottom: 15px; display: flex; align-items: center;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #f1f5f9; margin-left: 10px; }

        .input-grid { display: flex; gap: 25px; align-items: flex-end; margin-bottom: 15px; }
        .input-group { flex: 1; }
        .input-group label { 
            font-weight: 700; font-size: 13px; color: var(--text-sub); 
            margin-bottom: 8px; display: block; 
        }
        input, select {
            background: transparent; border: none; border-bottom: 2px solid var(--border-color);
            padding: 8px 0; height: 44px; font-size: 19px; font-weight: 700; width: 100%; 
            color: var(--text-main); outline: none; transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--yung-green); }

        .smart-tip-box { text-align: center; margin: 40px 0 30px 0; }
        .smart-tip {
            font-size: 14px; color: var(--premium-blue); background: #f8fafc; 
            border: 1px solid #e2e8f0; display: inline-block; 
            padding: 10px 35px; border-radius: 50px; font-weight: 800;
        }

        #textSummary {
            background: #fafafa; border-radius: 12px; padding: 30px;
            font-size: 18px; line-height: 2; margin-bottom: 35px; 
            border: 1px solid #e2e8f0; display: none;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; table-layout: fixed; }
        th { 
            color: var(--text-main); font-size: 16px; font-weight: 800; padding: 15px 5px; 
            text-align: center; border-bottom: 3px solid #f1f5f9; vertical-align: top;
        }
        .th-note { display: block; font-size: 11px; font-weight: 500; color: #94a3b8; margin-top: 6px; line-height: 1.4; }

        td { 
            padding: 25px 5px; text-align: center; background: #fff;
            border-top: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc;
            font-size: 22px; font-weight: 700;
        }
        td:first-child { border-left: 1px solid #f8fafc; border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 1px solid #f8fafc; border-radius: 0 15px 15px 0; }

        .col-price { color: var(--premium-blue); font-weight: 950; font-size: 28px !important; }
        .col-net { color: var(--yung-red); font-weight: 950; font-size: 28px !important; }
        .highlight-row td { background: #fffbeb !important; border-color: #fef3c7 !important; }

        .method-tag { color: var(--yung-green); font-size: 11px; font-weight: 800; display: block; margin-top: 5px; }
        .tax-tag { color: #94a3b8; font-size: 11px; font-weight: 600; display: block; margin-top: 5px; }

        .export-mode { width: 1100px !important; padding: 60px 80px !important; border-radius: 0 !important; }
        .export-mode .control-panel { display: none !important; }
        .export-mode #textSummary { display: block !important; visibility: visible !important; opacity: 1 !important; }

        .footer-info {
            margin-top: 50px; padding-top: 30px; border-top: 2px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: flex-end;
            font-size: 14px; color: var(--text-sub); white-space: nowrap;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .report-main-title { font-size: 26px; }
            .btn-group { flex-direction: column; }
            button { max-width: none; width: 100%; }
            .input-grid { flex-direction: column; align-items: stretch; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算數據</button>
        <button class="btn-save" onclick="saveAsImage()">📸 儲存 A4 質感報表</button>
    </div>

    <div class="scroll-wrapper">
        <div id="full-report-area">
            <div class="report-branding">
                <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
                <h1 class="report-main-title">成屋獲利對照報告</h1>
            </div>

            <div class="control-panel">
                <div class="input-section">
                    <div class="section-title">1. 取得成本設定</div>
                    <div class="input-grid">
                        <div class="input-group"><label>買入總價</label><input type="number" id="costPrice" value="886"></div>
                        <div class="input-group"><label>可認列裝潢成本(需有發票)</label><input type="number" id="renovationCost" value="0"></div>
                        <div class="input-group"><label>買方服務費</label><input type="number" id="buyAgencyFee" value="0"></div>
                        <div class="input-group"><label>買入時規費</label><input type="number" id="buyOtherFees" value="0"></div>
                    </div>
                </div>

                <div class="input-section">
                    <div class="section-title">2. 稅務與銷售設定</div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>房地合一稅率</label>
                            <select id="taxRate">
                                <option value="45" selected>45% (持有2年內)</option>
                                <option value="35">35% (持有2-5年)</option>
                                <option value="20">20% (持有5-10年)</option>
                                <option value="10">10% (自用優惠)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>賣方服務費</label>
                            <div style="display: flex; gap: 8px;">
                                <select id="agencyFeeType" style="flex: 1;">
                                    <option value="percent">%</option>
                                    <option value="fixed">金額</option>
                                </select>
                                <input type="number" id="agencyRate" value="4" style="flex: 1.2;">
                            </div>
                        </div>
                        <div class="input-group"><label>賣出時規費</label><input type="number" id="otherSellingFees" value="0"></div>
                    </div>
                </div>

                <div class="input-section" style="margin-bottom:0;">
                    <div class="section-title">3. 成交金額對照設定</div>
                    <div class="input-grid">
                        <div class="input-group"><label>基準價</label><input type="number" id="basePrice" value="1500"></div>
                        <div class="input-group">
                            <label>金額級距</label>
                            <select id="stepValue">
                                <option value="1">1萬</option>
                                <option value="5">5萬</option>
                                <option value="10" selected>10萬</option>
                            </select>
                        </div>
                        <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6"></div>
                    </div>
                </div>
            </div>

            <div id="textSummary"></div>

            <div class="capture-area">
                <div class="smart-tip-box">
                    <div class="smart-tip">
                        💡 系統已自動擇優認列抵扣費用 (實付仲介費 vs 免稅額3%最高30萬)
                    </div>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th style="width:17%;">成交價</th>
                            <th style="width:18%;">實付費用<span class="th-note">(仲介費+規費)</span></th>
                            <th style="width:17%;">抵扣費用<span class="th-note">(系統自動擇優)</span></th>
                            <th style="width:17%;">房地稅額<span class="th-note">(所得 × 稅率)</span></th>
                            <th style="width:18%;">最終淨獲利<span class="th-note">(賣價-成本-稅費)</span></th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
                
                <div class="footer-info">
                    <div class="footer-branch">
                        <strong style="color:var(--premium-blue); font-size: 18px;">永義房屋斗六成功莊敬加盟店</strong><br>
                        <span style="font-weight:600;">承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號</span>
                    </div>
                    <div style="text-align: right;">
                        製表時間：<span id="dateDisplay"></span><br>
                        <strong>免責聲明：</strong>實際稅額以國稅局核定為準
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const buyAgency = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const buyOther = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxRateVal = document.getElementById('taxRate').value;
        const taxRateText = document.getElementById('taxRate').options[document.getElementById('taxRate').selectedIndex].text;
        const taxRate = parseFloat(taxRateVal) / 100;
        const isSelfUse = (taxRateVal === '10');
        const agencyFeeType = document.getElementById('agencyFeeType').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const otherSellFee = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const basePrice = parseFloat(document.getElementById('basePrice').value) || 0;
        const stepValue = parseFloat(document.getElementById('stepValue').value) || 0;
        const rowCount = parseInt(document.getElementById('rowCount').value) || 6;

        const summaryArea = document.getElementById('textSummary');
        summaryArea.innerHTML = `
            <div style="font-size: 22px; color: var(--yung-green); font-weight: 950; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;">報告設定條件：</div>
            取得：買入 <strong>${costPrice}</strong> | 裝潢 <strong>${reno}</strong> | 買仲費 <strong>${buyAgency}</strong> | 買入規費 <strong>${buyOther}</strong> <br>
            稅務：稅率 <strong>${taxRateText}</strong> | 賣仲費 <strong>${agencyRate}${agencyFeeType==='percent'?'%':'萬'}</strong> | 賣出規費 <strong>${otherSellFee}</strong>
        `;

        const today = new Date();
        document.getElementById('dateDisplay').innerText = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        const acquisitionTotal = costPrice + reno + buyAgency + buyOther;

        for(let i = 0; i >= -rowCount + 1; i--) {
            let currentPrice = basePrice + (i * stepValue);
            let sellAgencyCalc = (agencyFeeType === 'percent') ? (currentPrice * agencyRate / 100) : agencyRate;
            let actualSellingExp = sellAgencyCalc + otherSellFee;
            let statExp = Math.min(currentPrice * 0.03, 30);
            let isAgencyBetter = actualSellingExp >= statExp;
            let deducExp = Math.max(actualSellingExp, statExp);
            let taxBase = Math.max(0, currentPrice - acquisitionTotal - deducExp);
            if (isSelfUse) taxBase = Math.max(0, taxBase - 400);
            let tax = taxBase * taxRate;
            let netProfit = currentPrice - acquisitionTotal - actualSellingExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${currentPrice}</td>
                <td>${actualSellingExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}<span class="method-tag">${isAgencyBetter?'[採仲介費]':'[採免稅額]'}</span></td>
                <td>${tax.toFixed(1)}<span class="tax-tag">(房地合一稅 ${taxRateVal}%)</span></td>
                <td class="col-net">${netProfit.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    function saveAsImage() {
        generateTable();
        const area = document.getElementById('full-report-area');
        area.classList.add('export-mode');

        setTimeout(() => {
            html2canvas(area, { 
                scale: 3, useCORS: true, backgroundColor: "#ffffff" 
            }).then(canvas => {
                let link = document.createElement('a');
                link.download = `成屋獲利報告_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                area.classList.remove('export-mode');
            }).catch(() => area.classList.remove('export-mode'));
        }, 800); 
    }
    window.onload = generateTable;
</script>
</body>
</html>
