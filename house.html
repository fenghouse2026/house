<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --premium-blue: #1e3a8a;
            --brand-gray: #595757;
            --border-color: #cccccc;
        }

        /* 🔥 第二道金牌：防止 iOS 點擊輸入框時畫面跳動 🔥 */
        @media screen and (max-width: 1050px) {
            input, select, textarea {
                font-size: 30px !important; /* 確保大於系統門檻 */
            }
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f4f7f6; color: var(--brand-gray);
            padding: 0; margin: 0 auto;
            width: 1050px; 
            /* 🔥 第三道金牌：防止版面水平晃動 🔥 */
            overflow-x: hidden;
            overscroll-behavior: none; 
        }

        .app-container { width: 960px; margin: 30px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; }
        .btn-group button { border: none; height: 120px; border-radius: 20px; cursor: pointer; font-size: 38px; font-weight: 900; width: 100%; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-group button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-calc { background: var(--yung-green); box-shadow: 0 10px 20px rgba(0, 140, 74, 0.3); }
        .btn-save { background: var(--yung-red); box-shadow: 0 10px 20px rgba(216, 42, 41, 0.4); }
        .btn-pc { background: var(--premium-blue); box-shadow: 0 10px 20px rgba(30, 58, 138, 0.4); }

        .report-branding { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--yung-red); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo-img { height: 80px; }
        .report-main-title { color: var(--yung-green); font-size: 36px; font-weight: bold; margin: 0; letter-spacing: 2px; }

        .control-panel { background: #fdfdfd; padding: 30px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 30px; }
        .control-panel h2 { text-align: center; color: var(--brand-gray); font-size: 32px; border-bottom: 2px dashed #ccc; padding-bottom: 20px; margin-top: 0; margin-bottom: 30px; font-weight: 900; }
        
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 900; margin-bottom: 12px; font-size: 24px; color: #444; }
        input, select { padding: 16px 20px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 30px; font-weight: bold; color: #1e3a8a; box-sizing: border-box; background-color: #fff; outline: none; }

        .report-area { position: relative; margin-top: 10px; border-top: 8px solid #fdb913; padding-top: 30px; background-color: #ffffff; }
        .watermark-overlay {
            position: absolute; top: 120px; left: 0; width: 100%; height: calc(100% - 120px);
            pointer-events: none; z-index: 1; opacity: 0.2;
            background-image: url('logo浮水印.png');
            background-repeat: no-repeat; background-position: center; background-size: 450px auto;
        }

        table { width: 100%; border-collapse: collapse; position: relative; z-index: 2; table-layout: fixed; }
        th, td { padding: 18px 5px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { color: var(--brand-gray); font-size: 18px; font-weight: bold; border-bottom: 2px solid #a0aec0; border-top: 2px solid #a0aec0; background: #fff; }
        td { font-size: 24px; font-weight: bold; color: #1e293b; white-space: nowrap; background: rgba(255,255,255,0.7); }
        .highlight-row td { background-color: #fff4b3 !important; }
        .col-price { color: #2c5282; font-size: 28px; }
        .col-net { color: var(--yung-red); font-size: 28px; }
        
        #exportSummary { display: none; background: #f9f9f9; padding: 25px; border-radius: 6px; border-left: 6px solid var(--yung-green); margin-bottom: 25px; font-size: 24px; line-height: 1.8; }
        .footer-info { margin-top: 50px; padding-top: 25px; border-top: 1px dashed #ccc; display: flex; justify-content: space-between; font-size: 16px; color: #777; }

        .exporting .control-panel, .exporting .btn-group { display: none; }
        .exporting #exportSummary { display: block; }
        .exporting { box-shadow: none; border: none; margin: 0; }

        #toastMessage {
            visibility: hidden; min-width: 400px; background-color: var(--yung-green); color: #fff;
            text-align: center; border-radius: 60px; padding: 30px; position: fixed; z-index: 9999;
            left: 50%; transform: translateX(-50%); bottom: 40px; font-size: 32px; font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid #ffffff;
        }
        #toastMessage.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="toastMessage">✅ 處理成功！</div>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算試算表</button>
        <button class="btn-save" id="btnSave" onclick="shareOrDownload()">📤 手機分享 / 儲存照片</button>
        <button class="btn-pc" id="btnPc" onclick="directDownloadPC()">💻 電腦版下載</button>
    </div>

    <div class="report-branding">
        <div class="brand-logo-container">
            <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        </div>
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <h2>一、成屋專屬參數設定</h2>
        
        <div class="input-grid">
            <div class="input-group"><label>買入總價 (萬元)</label><input type="number" id="costPrice" value="886"></div>
            <div class="input-group"><label>可列舉裝潢成本 (萬元)</label><input type="number" id="renovationCost" value="0"></div>
            <div class="input-group"><label>購買時仲介費 (萬元)</label><input type="number" id="buyAgencyFee" value="0"></div>
            <div class="input-group"><label>購買時代書費等規費 (萬元)</label><input type="number" id="buyOtherFees" value="0"></div>
        </div>

        <div class="input-grid" style="border-top: 2px dashed #ccc; padding-top: 30px; margin-top: 10px;">
            <div class="input-group">
                <label>房地合一稅率 (%)</label>
                <select id="taxRate">
                    <option value="45" selected>45% (持有2年內)</option>
                    <option value="35">35% (持有2-5年)</option>
                    <option value="20">20% (持有5-10年)</option>
                    <option value="15">15% (持有10年以上)</option>
                    <option value="10">10% (自用滿6年優惠)</option>
                </select>
            </div>
            <div class="input-group"><label>賣方其他規費 (萬元)</label><input type="number" id="otherSellingFees" value="0"></div>
        </div>

        <div class="input-grid" style="background: #f1f5f9; padding: 20px; border-radius: 12px; margin-top: -10px;">
            <div class="input-group">
                <label style="color:var(--yung-red);">賣方服務費 (%)</label>
                <input type="number" id="agencyRate" value="4">
            </div>
            <div class="input-group">
                <label style="color:var(--yung-red);">或 固定服務費 (萬元)</label>
                <input type="number" id="fixedAgencyFee" value="" placeholder="自由填寫">
            </div>
        </div>

        <div class="input-grid" style="border-top: 2px dashed #ccc; padding-top: 30px; margin-top: 20px;">
            <div class="input-group"><label>基準成交價 (萬元)</label><input type="number" id="basePrice" value="1500"></div>
            <div class="input-group">
                <label>級距單位 (萬元)</label>
                <select id="stepValue">
                    <option value="1">1萬</option>
                    <option value="5">5萬</option>
                    <option value="10" selected>10萬</option>
                    <option value="20">20萬</option>
                </select>
            </div>
            <div class="input-group"><label>往下延展筆數</label><input type="number" id="rowCount" value="8"></div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <div class="watermark-overlay"></div>
        <table>
            <thead>
                <tr>
                    <th style="width:15%;">成交價</th>
                    <th style="width:17%;">實付費用</th>
                    <th style="width:20%;">抵扣費用</th>
                    <th style="width:16%;">課稅所得</th>
                    <th style="width:16%;">房地合一稅</th>
                    <th style="width:16%;">淨獲利</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號
        </div>
        <div style="text-align:right;">
            製表時間：<span id="dateDisplay"></span><br>
            <strong>免責聲明：實際稅額以國稅局核定為準。</strong>
        </div>
    </div>
</div>

<script>
    function showSuccessToast(message) {
        const toast = document.getElementById("toastMessage");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 3000);
    }

    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const buyAgencyFee = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const buyOtherFees = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxRateVal = document.getElementById('taxRate').value;
        const taxRate = parseFloat(taxRateVal) / 100;
        const fixedFeeInput = document.getElementById('fixedAgencyFee').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const sOther = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const rows = parseInt(document.getElementById('rowCount').value) || 8;

        const totalAcq = cost + reno + buyAgencyFee + buyOtherFees;
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();

        const feeDisplay = fixedFeeInput !== "" ? `${fixedFeeInput} 萬 (固定)` : `${agencyRate}%`;

        document.getElementById('exportSummary').innerHTML = `
            <strong>當前報告設定條件：</strong><br>
            取得成本：買入 ${cost} 萬 | 裝潢 ${reno} 萬 | 買方費 ${buyAgencyFee} 萬 (總成本: ${totalAcq.toFixed(1)})<br>
            稅務設定：稅率 ${taxRateVal}% | 賣方仲介費 ${feeDisplay} | 賣出規費 ${sOther} 萬
        `;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        for(let i = 0; i >= -rows + 1; i--) {
            let price = base + (i * step);
            let sellAgency = fixedFeeInput !== "" ? parseFloat(fixedFeeInput) : price * (agencyRate / 100);
            let actualSellExp = sellAgency + sOther;
            let deducExp = Math.max(actualSellExp, Math.min(price * 0.03, 30));
            let taxBase = price - totalAcq - deducExp;
            if (taxRateVal === '10') taxBase = Math.max(0, taxBase - 400); 
            else taxBase = Math.max(0, taxBase);
            let tax = taxBase * taxRate;
            let net = price - totalAcq - actualSellExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td>${actualSellExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}</td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function directDownloadPC() {
        generateTable();
        const mainApp = document.getElementById('main-app');
        mainApp.classList.add('exporting'); 
        await new Promise(r => setTimeout(r, 200)); 
        try {
            const canvas = await html2canvas(mainApp, { scale: 2, backgroundColor: "#ffffff" });
            mainApp.classList.remove('exporting');
            const imgData = canvas.toDataURL("image/png");
            let link = document.createElement('a');
            link.download = `成屋獲利報告_${new Date().getTime()}.png`;
            link.href = imgData;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showSuccessToast("✅ 下載成功！");
        } catch (error) {
            mainApp.classList.remove('exporting');
            alert('下載失敗');
        }
    }

    async function shareOrDownload() {
        generateTable();
        const mainApp = document.getElementById('main-app');
        mainApp.classList.add('exporting'); 
        await new Promise(r => setTimeout(r, 200));
        try {
            const canvas = await html2canvas(mainApp, { scale: 2, backgroundColor: "#ffffff" });
            mainApp.classList.remove('exporting');
            canvas.toBlob(async (blob) => {
                const file = new File([blob], '成屋獲利報告.png', { type: 'image/png' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '成屋獲利報告' });
                    showSuccessToast("✅ 分享成功！");
                } else {
                    const url = URL.createObjectURL(blob);
                    let link = document.createElement('a');
                    link.download = `成屋獲利報告.png`;
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showSuccessToast("✅ 下載成功！");
                }
            }, 'image/png');
        } catch (error) {
            mainApp.classList.remove('exporting');
            alert('處理失敗');
        }
    }

    window.onload = generateTable;
</script>
</body>
</html>
