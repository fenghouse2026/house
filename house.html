<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-yellow: #fdb913; 
            --yung-red: #D82A29;    
            --yung-green: #008C4A;  
            --text-main: #1a202c;
            --text-sub: #718096;
            --premium-blue: #1a365d; 
            --input-bg: #f8fafc;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f4f7f6;
            color: var(--text-main);
            padding: 50px 20px;
            margin: 0;
            overscroll-behavior: none; 
        }

        .app-container { max-width: 900px; margin: auto; }
        
        .btn-group {
            text-align: center;
            margin-bottom: 40px; 
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            font-family: inherit;
            background: var(--yung-green);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 140, 74, 0.15);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 140, 74, 0.25);
        }

        .btn-red { 
            background: var(--yung-red);
            box-shadow: 0 4px 10px rgba(216, 42, 41, 0.15);
        }

        /* 報表主要卡片 */
        #full-report-area {
            background: #ffffff;
            padding: 60px 70px; 
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            border-top: 12px solid var(--yung-yellow); 
            position: relative; 
            overflow: hidden; 
        }

        /* 加大版 LOGO 浮水印 */
        .watermark-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999; 
            pointer-events: none; 
            overflow: hidden;
        }

        .wm-logo {
            position: absolute;
            top: 75%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 480px; 
            max-width: 85%;
            opacity: 0.04; 
        }

        /* 品牌標題 */
        .report-branding {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 50px; 
            padding-bottom: 25px;
            border-bottom: 1px solid #edf2f7;
        }

        .brand-logo-img { height: 80px; width: auto; }
        .report-main-title {
            color: var(--yung-green);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* --- 極簡單欄輸入面板 --- */
        .control-panel { margin-bottom: 50px; }

        .input-section {
            background: #fff;
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--yung-green);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #f1f5f9;
            margin-left: 15px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 簡潔的雙欄 */
            gap: 25px 40px;
        }

        .input-group { display: flex; flex-direction: column; }
        .input-group label {
            font-weight: 700;
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 12px 18px;
            height: 52px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            background: #fff;
            border-color: var(--yung-green);
            box-shadow: 0 0 0 4px rgba(0, 140, 74, 0.06);
            outline: none;
        }

        /* 摘要樣式 */
        .print-summary {
            background: #f8fafc;
            border-left: 5px solid var(--yung-green);
            padding: 25px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 2;
            margin-bottom: 40px;
            color: var(--text-main);
        }

        /* 表格優化 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th {
            color: #a0aec0;
            font-size: 12px;
            font-weight: 700;
            padding: 20px 10px;
            border-bottom: 2px solid #f1f5f9;
            text-align: center;
        }
        td { padding: 22px 10px; border-bottom: 1px solid #f8fafc; text-align: center; }
        
        .col-price { color: var(--premium-blue); font-weight: 800; font-size: 18px; }
        .col-net-profit { color: var(--yung-red) !important; font-weight: 800 !important; font-size: 18px; }
        
        .highlight-row { background-color: #fffbeb !important; }
        .col-formula { display: block; font-size: 10px; color: #cbd5e1; margin-top: 5px; font-weight: normal;}

        /* A4 模式微調 */
        .export-mode { width: 850px !important; padding: 60px 80px !important; }
        .export-mode .control-panel { display: none !important; }
        .export-mode .wm-logo { top: 58%; width: 520px; }

        .footer-info {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            color: #a0aec0;
            font-size: 14px;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            #full-report-area:not(.export-mode) { padding: 40px 20px; }
            .input-grid { grid-template-columns: 1fr; gap: 20px; }
            .report-branding { flex-direction: column; text-align: center; gap: 20px; }
            .wm-logo { width: 280px; top: 85%; }
            table { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="btn-group">
        <button onclick="generateTable()">📊 重新計算</button>
        <button class="btn-red" onclick="saveAsImage()">📸 儲存 A4 質感報表</button>
    </div>

    <div id="full-report-area">
        <div class="watermark-overlay">
            <img src="logo浮水印.png" class="wm-logo" alt="">
        </div>

        <div class="report-branding">
            <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
            <h1 class="report-main-title">成屋獲利對照報告</h1>
        </div>

        <div class="control-panel">
            <div id="textSummary" class="print-summary" style="display:none;">
                <strong>報告設定條件：</strong><br>
                買入總價 <span id="s_cost" style="color:var(--premium-blue); font-weight:bold;">1000</span> 萬 | 
                裝潢成本 <span id="s_reno" style="color:var(--premium-blue); font-weight:bold;">50</span> 萬 |
                房地合一稅率 <span id="s_tax" style="color:var(--yung-red); font-weight:bold;">35</span>% <br>
                買方仲介費 <span id="s_buyAgency">20</span> 萬 | 
                買方規費 <span id="s_buyOther">10</span> 萬 | 
                賣方仲介費 <span id="s_sellAgency">4</span> <span id="s_sellAgencyType">%</span> | 
                賣方規費 <span id="s_sellOther">0</span> 萬
            </div>

            <div class="input-section">
                <div class="section-title">物件取得設定</div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>買入總價 (萬)</label>
                        <input type="number" id="costPrice" value="1000">
                    </div>
                    <div class="input-group">
                        <label>可列舉裝潢成本 (萬)</label>
                        <input type="number" id="renovationCost" value="50">
                    </div>
                    <div class="input-group">
                        <label>買方仲介服務費 (萬)</label>
                        <input type="number" id="buyAgencyFee" value="20">
                    </div>
                    <div class="input-group">
                        <label>代書費與契稅等規費 (萬)</label>
                        <input type="number" id="buyOtherFees" value="10">
                    </div>
                </div>
            </div>

            <div class="input-section">
                <div class="section-title">銷售與稅務設定</div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>房地合一稅率</label>
                        <select id="taxRate">
                            <option value="45">45% (持有2年內)</option>
                            <option value="35" selected>35% (持有2-5年)</option>
                            <option value="20">20% (持有5-10年)</option>
                            <option value="15">15% (持有10年以上)</option>
                            <option value="10">10% (自用優惠)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>賣方仲介服務費</label>
                        <div style="display: flex; gap: 10px;">
                            <select id="agencyFeeType" style="flex: 0 0 35%;">
                                <option value="percent">%</option>
                                <option value="fixed">萬</option>
                            </select>
                            <input type="number" id="agencyRate" value="4" style="flex: 1;">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>賣方其他規費 (萬)</label>
                        <input type="number" id="otherSellingFees" value="0">
                    </div>
                </div>
            </div>

            <div class="input-section">
                <div class="section-title">表格對照範圍</div>
                <div class="input-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="input-group">
                        <label>基準成交價 (萬)</label>
                        <input type="number" id="basePrice" value="1500">
                    </div>
                    <div class="input-group">
                        <label>級距單位</label>
                        <select id="stepValue">
                            <option value="5">5萬</option>
                            <option value="10" selected>10萬</option>
                            <option value="20">20萬</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>顯示筆數</label>
                        <input type="number" id="rowCount" value="8">
                    </div>
                </div>
            </div>
        </div>

        <div class="capture-area">
            <div class="report-header">
                <div class="brand-subtitle">(成屋專用) 稅務試算對照表</div>
                <div class="system-hint">系統已自動為您選擇最優的抵扣費用</div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>成交價<span class="col-formula">(萬)</span></th>
                        <th>實付費用<span class="col-formula">(萬)</span></th>
                        <th>抵扣費用<span class="col-formula">(萬)</span></th>
                        <th>課稅所得<span class="col-formula">(萬)</span></th>
                        <th>房地合一稅<span class="col-formula">(萬)</span></th>
                        <th>淨獲利<span class="col-formula">(萬)</span></th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
            
            <div class="footer-info">
                <div class="footer-branch">
                    <strong style="color:var(--text-main)">永義房屋斗六成功莊敬加盟店</strong>
                    <span style="font-size: 11px; margin-left: 5px;">(承峰不動產仲介有限公司)</span><br>
                    雲林縣斗六市成功二街126號
                </div>
                <div style="text-align: right;">
                    製表時間：<span id="dateDisplay"></span><br>
                    數據僅供參考，實際以國稅局核定為準
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const costPrice = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const buyAgency = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const buyOther = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxRate = parseFloat(document.getElementById('taxRate').value) / 100 || 0;
        const isSelfUse = (document.getElementById('taxRate').value === '10');
        
        const agencyFeeType = document.getElementById('agencyFeeType').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const otherSellFee = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const basePrice = parseFloat(document.getElementById('basePrice').value) || 0;
        const stepValue = parseFloat(document.getElementById('stepValue').value) || 0;
        const rowCount = parseInt(document.getElementById('rowCount').value) || 8;

        document.getElementById('s_cost').innerText = costPrice;
        document.getElementById('s_reno').innerText = reno;
        document.getElementById('s_buyAgency').innerText = buyAgency;
        document.getElementById('s_buyOther').innerText = buyOther;
        document.getElementById('s_tax').innerText = document.getElementById('taxRate').value;
        document.getElementById('s_sellAgency').innerText = agencyRate;
        document.getElementById('s_sellAgencyType').innerText = (agencyFeeType === 'percent' ? '%' : '萬');
        document.getElementById('s_sellOther').innerText = otherSellFee;

        const today = new Date();
        document.getElementById('dateDisplay').innerText = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        const totalAcquisitionCost = costPrice + reno + buyAgency + buyOther;

        for(let i = 0; i >= -rowCount; i--) {
            let currentPrice = basePrice + (i * stepValue);
            let actualSellingExp = (agencyFeeType === 'percent' ? (currentPrice * agencyRate / 100) : agencyRate) + otherSellFee;
            let statExp = Math.min(currentPrice * 0.03, 30);
            let deducExp = Math.max(actualSellingExp, statExp);

            let taxBase = Math.max(0, currentPrice - totalAcquisitionCost - deducExp);
            if (isSelfUse) taxBase = Math.max(0, taxBase - 400);

            let tax = taxBase * taxRate;
            let netProfit = currentPrice - totalAcquisitionCost - actualSellingExp - tax;

            let tr = document.createElement('tr');
            if (i === 0) tr.className = 'highlight-row';
            tr.innerHTML = `
                <td class="col-price">${currentPrice}</td>
                <td>${actualSellingExp.toFixed(2)}</td>
                <td>${deducExp.toFixed(2)}</td>
                <td>${taxBase.toFixed(2)}</td>
                <td>${tax.toFixed(2)}</td>
                <td class="col-net-profit">${netProfit.toFixed(2)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    function saveAsImage() {
        document.querySelectorAll('input').forEach(i => i.blur());
        generateTable();
        const area = document.getElementById('full-report-area');
        area.classList.add('export-mode');
        window.scrollTo(0, 0);

        setTimeout(() => {
            html2canvas(area, {
                scale: 3,
                backgroundColor: "#ffffff",
                useCORS: true,
                width: area.offsetWidth,
                height: area.offsetHeight 
            }).then(canvas => {
                let link = document.createElement('a');
                link.download = `獲利報告_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                area.classList.remove('export-mode');
            });
        }, 400); 
    }
    window.onload = generateTable;
</script>
</body>
</html>
