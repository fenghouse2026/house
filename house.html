<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050">
    <title>成屋獲利對照報告 - 永義房屋斗六成功莊敬加盟店</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #cccccc;
        }

        /* 強制維持大寬度，防止手機變形 */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f4f7f6; color: var(--text-main);
            margin: 0 auto; padding: 20px 0;
            width: 1050px; box-sizing: border-box;
        }

        .app-container { 
            width: 960px; margin: 0 auto; background: #fff; padding: 35px 45px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button {
            border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer;
            font-size: 16px; font-weight: bold; transition: opacity 0.2s;
        }
        .btn-calc { background: var(--yung-green); color: white; }
        .btn-save { background: var(--yung-red); color: white; }

        .report-branding { text-align: center; margin-bottom: 30px; }
        .brand-logo-img { height: 70px; margin-bottom: 10px; }
        .report-main-title { color: #1e3a8a; font-size: 32px; font-weight: bold; margin: 0; letter-spacing: 2px; }

        /* 回歸舊版乾淨設定區 */
        .section-title { font-size: 15px; font-weight: bold; color: var(--yung-green); margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
        .input-grid { display: flex; gap: 20px; margin-bottom: 25px; align-items: flex-end; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; color: var(--text-sub); margin-bottom: 8px; font-weight: bold; }
        input, select {
            padding: 8px 10px; border: none; border-bottom: 2px solid var(--border-color); border-radius: 0;
            font-size: 18px; font-weight: bold; width: 100%; outline: none; background: transparent;
        }

        /* 💡 浮水印容器與表格設計 💡 */
        .table-container { position: relative; width: 100%; margin-top: 10px; }
        
        /* 🔥 修正：大氣 Logo 浮水印 (單一居中，變大變深) 🔥 */
        .watermark-overlay {
            position: absolute; top: 100px; left: 0; width: 100%; height: calc(100% - 100px);
            pointer-events: none; z-index: 1; 
            opacity: 0.08; /* 🔥 稍微變深 (增加不透明度) 🔥 */
            background-image: url('logo浮水印.png');
            background-repeat: no-repeat; /* 🔥 只顯示一個，不重複平鋪 🔥 */
            background-position: center center; /* 🔥 居中在數據區域 🔥 */
            background-size: 450px auto; /* 🔥 Logo 變大 🔥 */
        }

        table { width: 100%; border-collapse: collapse; position: relative; z-index: 2; table-layout: fixed; }
        th, td { padding: 15px 5px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { color: #475569; font-size: 16px; vertical-align: top; white-space: nowrap; }
        .th-note { display: block; font-size: 12px; color: #94a3b8; font-weight: normal; margin-top: 6px; line-height: 1.4; white-space: nowrap; }
        
        td { font-size: 22px; font-weight: bold; color: #1e293b; background: rgba(255,255,255,0.7); white-space: nowrap; }
        
        .highlight-row td { background-color: rgba(255, 251, 235, 0.8) !important; }
        .col-price { color: #1e3a8a; font-size: 26px; }
        .col-net { color: var(--yung-red); font-size: 26px; }
        
        /* 匯出摘要 */
        #exportSummary { display: none; background: #f8fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; line-height: 1.8; border: 1px solid #e2e8f0; }

        /* 回歸舊版頁尾 */
        .footer-info { margin-top: 40px; padding-top: 20px; border-top: 2px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 14px; color: var(--text-sub); white-space: nowrap; }
        .footer-left strong { font-size: 18px; color: #1e293b; display: block; margin-bottom: 5px; }

        .exporting .btn-group, .exporting .control-panel { display: none; }
        .exporting #exportSummary { display: block; }
        .exporting .app-container { box-shadow: none; padding: 40px; }
    </style>
</head>
<body>

<div class="app-container" id="capture-area">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" onclick="saveAsImage()">📸 儲存報表</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <div class="input-section">
            <div class="section-title">取得成本與稅務設定</div>
            <div class="input-grid">
                <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="886"></div>
                <div class="input-group"><label>可認列裝潢成本 (需有發票)</label><input type="number" id="renovationCost" value="0"></div>
                <div class="input-group"><label>買方服務費 (萬)</label><input type="number" id="buyAgencyFee" value="0"></div>
                <div class="input-group"><label>買入時規費 (萬)</label><input type="number" id="buyOtherFees" value="0"></div>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>房地合一稅率</label>
                    <select id="taxRate">
                        <option value="45" selected>45% (持有2年內)</option>
                        <option value="35">35% (持有2-5年)</option>
                        <option value="20">20% (持有5-10年)</option>
                        <option value="10">10% (自用優惠)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>賣方服務費</label>
                    <div style="display: flex; gap: 8px;">
                        <select id="agencyFeeType" style="width: 80px;"><option value="percent">%</option><option value="fixed">萬</option></select>
                        <input type="number" id="agencyRate" value="4" style="flex: 1;">
                    </div>
                </div>
                <div class="input-group"><label>賣出時規費 (萬)</label><input type="number" id="otherSellingFees" value="0"></div>
            </div>

            <div class="section-title">成交金額對照設定</div>
            <div class="input-grid" style="width: 75%;">
                <div class="input-group"><label>基準價 (萬)</label><input type="number" id="basePrice" value="1500"></div>
                <div class="input-group">
                    <label>金額級距</label>
                    <select id="stepValue">
                        <option value="1">1萬</option>
                        <option value="5">5萬</option>
                        <option value="10" selected>10萬</option>
                    </select>
                </div>
                <div class="input-group"><label>顯示筆數</label><input type="number" id="rowCount" value="6"></div>
            </div>
        </div>

        <div id="exportSummary"></div>

        <div style="text-align:center; margin-bottom:20px;">
            <span style="font-size:14px; color:#1e3a8a; background:#f8fafc; border:1px solid #e2e8f0; padding:8px 25px; border-radius:50px; font-weight:bold;">
                💡 系統已自動擇優認列抵扣費用 (實付仲介費 vs 免稅額3%最高30萬)
            </span>
        </div>

        <div class="table-container">
            <div class="watermark-overlay"></div>
            
            <table>
                <thead>
                    <tr>
                        <th style="width:15%;">成交價(萬)</th>
                        <th style="width:17%;">實付費用(萬)<span class="th-note">(仲介費+規費)</span></th>
                        <th style="width:20%;">抵扣費用(萬)<span class="th-note">(擇優:仲介費或最高30萬)</span></th>
                        <th style="width:16%;">課稅所得(萬)<span class="th-note">(賣價-總成本-抵扣)</span></th>
                        <th style="width:16%;">房地合一稅(萬)<span class="th-note">(所得 × 稅率 = 稅金)</span></th>
                        <th style="width:16%;">淨獲利(萬)<span class="th-note">(賣價-成本-實付-稅)</span></th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>

        <div class="footer-info">
            <div class="footer-left">
                <strong>永義房屋斗六成功莊敬加盟店</strong>
                承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號
            </div>
            <div class="footer-right">
                製表時間：<span id="dateDisplay"></span><br>
                <strong>免責聲明：實際稅額以國稅局核定為準，計算錯誤時不負擔任何責任。</strong>
            </div>
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const costCost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renovationCost').value) || 0;
        const bAgency = parseFloat(document.getElementById('buyAgencyFee').value) || 0;
        const bOther = parseFloat(document.getElementById('buyOtherFees').value) || 0;
        const taxRateVal = document.getElementById('taxRate').value;
        const taxRate = parseFloat(taxRateVal) / 100;
        const agencyType = document.getElementById('agencyFeeType').value;
        const agencyRate = parseFloat(document.getElementById('agencyRate').value) || 0;
        const sOther = parseFloat(document.getElementById('otherSellingFees').value) || 0;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;
        const step = parseFloat(document.getElementById('stepValue').value) || 10;
        const rows = parseInt(document.getElementById('rowCount').value) || 6;

        const totalAcquisition = costCost + reno + bAgency + bOther;
        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();

        document.getElementById('exportSummary').innerHTML = `
            <strong style="color:var(--yung-green); font-size:22px;">報告設定條件：</strong><br>
            取得成本：買入 <strong>${costCost}</strong> | 裝潢 <strong>${reno}</strong> | 買方仲介費 <strong>${bAgency}</strong> | 買入規費 <strong>${bOther}</strong> (總成本: ${totalAcquisition.toFixed(1)})<br>
            稅務與銷售：稅率 <strong>${taxRateVal}%</strong> | 賣方仲介費 <strong>${agencyRate}${agencyType==='percent'?'%':'元'}</strong> | 賣出規費 <strong>${sOther}</strong>
        `;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        for(let i = 0; i >= -rows + 1; i--) {
            let price = base + (i * step);
            let sellAgency = (agencyType === 'percent') ? (price * agencyRate / 100) : agencyRate;
            let actualSellExp = sellAgency + sOther;
            let deducExp = Math.max(actualSellExp, Math.min(price * 0.03, 30));
            let taxBase = Math.max(0, price - totalAcquisition - deducExp);
            if (taxRateVal === '10') taxBase = Math.max(0, taxBase - 400);
            let tax = taxBase * taxRate;
            let net = price - totalAcquisition - actualSellExp - tax;

            let tr = document.createElement('tr');
            if(i===0) tr.className='highlight-row';
            tr.innerHTML = `
                <td class="col-price">${price}</td>
                <td>${actualSellExp.toFixed(1)}</td>
                <td>${deducExp.toFixed(1)}<br><span style="font-size:12px; color:#008C4A; font-weight:bold;">${actualSellExp >= Math.min(price * 0.03, 30) ? '[採仲介費]' : '[採免稅額]'}</span></td>
                <td>${taxBase.toFixed(1)}</td>
                <td>${tax.toFixed(1)}</td>
                <td class="col-net">${net.toFixed(1)}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    function saveAsImage() {
        generateTable();
        const area = document.getElementById('capture-area');
        area.classList.add('exporting');
        setTimeout(() => {
            html2canvas(area, { scale: 2, backgroundColor: "#ffffff", useCORS: true }).then(canvas => {
                let link = document.createElement('a');
                link.download = `成屋獲利報告.png`;
                link.href = canvas.toDataURL();
                link.click();
                area.classList.remove('exporting');
            });
        }, 600);
    }
    window.onload = generateTable;
</script>
</body>
</html>
