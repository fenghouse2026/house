<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成屋獲利對照報告 - 永義房屋</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --yung-green: #008C4A;  
            --yung-red: #D82A29;    
            --premium-blue: #1e3a8a;
            --brand-gray: #595757;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f4f7f6; color: var(--brand-gray);
            padding: 0; margin: 0; width: 100%;
        }

        .app-container { 
            width: 95%; max-width: 1050px; margin: 15px auto; 
            background: #fff; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); box-sizing: border-box;
        }

        /* 按鈕區 */
        .btn-group { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-group button { 
            border: none; padding: 18px; border-radius: 12px; cursor: pointer; 
            font-size: 20px; font-weight: 900; flex: 1; color: white; transition: 0.3s;
        }
        .btn-calc { background: var(--yung-green); }
        .btn-save { background: var(--yung-red); }

        .report-branding { 
            text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--yung-red); 
            padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .brand-logo-img { height: 50px; }
        .report-main-title { color: var(--yung-green); font-size: 26px; font-weight: bold; margin: 0; }

        /* 輸入區佈局 */
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 900; margin-bottom: 8px; font-size: 18px; color: #444; }
        
        .fee-input-wrapper { display: flex; border: 2px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .fee-input-wrapper select { width: 80px; border: none; background: #eee; font-size: 18px; font-weight: bold; padding: 10px; }
        .fee-input-wrapper input { border: none; flex: 1; }

        input, select { 
            padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; 
            font-size: 22px; font-weight: bold; color: #1e3a8a; width: 100%; box-sizing: border-box;
        }

        /* 報表區排版核心：手機版顯示為卡片，電腦版顯示為表格 */
        .report-area { border-top: 6px solid #fdb913; padding-top: 20px; }
        
        /* 預設隱藏卡片，顯示表格 (電腦版) */
        .mobile-cards { display: none; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; font-size: 16px; padding: 12px 5px; border-bottom: 2px solid #a0aec0; }
        td { font-size: 22px; font-weight: bold; padding: 15px 5px; text-align: center; border-bottom: 1px solid #eee; }

        /* 手機版樣式切換 */
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .report-branding { flex-direction: column; gap: 10px; }
            
            /* 關鍵：手機隱藏表格，顯示一目了然的卡片 */
            table { display: none; }
            .mobile-cards { display: block; }
            
            .data-card {
                background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
                margin-bottom: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            }
            .card-header { 
                display: flex; justify-content: space-between; align-items: center;
                border-bottom: 1px dashed #ddd; padding-bottom: 8px; margin-bottom: 10px;
            }
            .card-title { font-size: 18px; color: #555; }
            .card-price { font-size: 24px; color: var(--premium-blue); font-weight: 900; }
            
            .card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .data-item { font-size: 15px; color: #666; }
            .data-item span { display: block; font-size: 18px; color: #333; font-weight: bold; }
            
            .card-footer-net { 
                grid-column: span 2; background: #fff4b3; padding: 10px; 
                border-radius: 6px; text-align: center; margin-top: 5px;
            }
            .net-label { font-size: 16px; color: #444; }
            .net-value { font-size: 26px; color: var(--yung-red); font-weight: 900; }
        }

        /* 匯出圖片時，強制恢復成專業表格 */
        .exporting .mobile-cards { display: none !important; }
        .exporting table { display: table !important; width: 1050px; }
        .exporting { width: 1100px !important; }
        .exporting .control-panel, .exporting .btn-group { display: none; }
        #exportSummary { display: none; margin-bottom: 15px; font-size: 20px; padding: 15px; border-left: 6px solid var(--yung-green); background: #f9f9f9; }
        .exporting #exportSummary { display: block; }

        /* 頁腳 */
        .footer-info { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-end; color: #7f8c8d; font-size: 13px; }
        .footer-left strong { font-size: 17px; color: #2c3e50; display: block; }
        .footer-right { text-align: right; }

        #toast { visibility: hidden; min-width: 250px; background: var(--yung-green); color: white; text-align: center; border-radius: 50px; padding: 15px; position: fixed; left: 50%; transform: translateX(-50%); bottom: 30px; z-index: 1000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div id="toast">✅ 報表處理完成</div>

<div class="app-container" id="main-app">
    <div class="btn-group">
        <button class="btn-calc" onclick="generateTable()">📊 重新計算</button>
        <button class="btn-save" id="btnSave" onclick="saveAsImage()">📤 儲存報表圖檔</button>
    </div>

    <div class="report-branding">
        <img src="logo.png" alt="永義房屋" class="brand-logo-img" onerror="this.style.display='none'">
        <h1 class="report-main-title">成屋獲利對照報告</h1>
    </div>

    <div class="control-panel">
        <div class="input-grid">
            <div class="input-group"><label>買入總價 (萬)</label><input type="number" id="costPrice" value="1000"></div>
            <div class="input-group"><label>裝潢成本 (萬)</label><input type="number" id="renoCost" value="50"></div>
            <div class="input-group"><label>買入稅費 (萬)</label><input type="number" id="buyFees" value="20"></div>
            <div class="input-group">
                <label>賣方服務費</label>
                <div class="fee-input-wrapper">
                    <select id="feeType" onchange="generateTable()"><option value="percent">%</option><option value="fixed">萬</option></select>
                    <input type="number" id="agencyVal" value="4" oninput="generateTable()">
                </div>
            </div>
            <div class="input-group">
                <label>房地合一稅率</label>
                <select id="taxRate">
                    <option value="45">45% (持有2年內)</option>
                    <option value="35" selected>35% (持有2-5年)</option>
                    <option value="20">20% (持有5-10年)</option>
                </select>
            </div>
            <div class="input-group"><label>基準成交價 (萬)</label><input type="number" id="basePrice" value="1500"></div>
        </div>
    </div>

    <div id="exportSummary"></div>

    <div class="report-area">
        <table id="pcTable">
            <thead>
                <tr>
                    <th>成交價</th><th>服務費</th><th>抵扣額</th><th>應稅所得</th><th>合一稅</th><th>淨獲利</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>

        <div class="mobile-cards" id="mobileCards"></div>
    </div>

    <div class="footer-info">
        <div class="footer-left">
            <strong>永義房屋斗六成功莊敬加盟店</strong>
            承峰不動產仲介有限公司 | 雲林縣斗六市成功二街126號
        </div>
        <div class="footer-right">
            製表時間：<span id="dateDisplay"></span>
            <div style="font-size:11px; color:#bdc3c7;">免責聲明：實際稅額以國稅局核定為準。</div>
        </div>
    </div>
</div>

<script>
    function generateTable() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const reno = parseFloat(document.getElementById('renoCost').value) || 0;
        const buyFees = parseFloat(document.getElementById('buyFees').value) || 0;
        const totalAcq = cost + reno + buyFees;

        const feeType = document.getElementById('feeType').value;
        const agencyVal = parseFloat(document.getElementById('agencyVal').value) || 0;
        const taxRate = parseFloat(document.getElementById('taxRate').value) / 100;
        const base = parseFloat(document.getElementById('basePrice').value) || 0;

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString();
        document.getElementById('exportSummary').innerHTML = `設定：買入 ${cost}萬 | 服務費 ${agencyVal}${feeType==='percent'?'%':'萬'} | 稅率 ${(taxRate*100)}%`;

        const tbody = document.getElementById('resultBody');
        const mCards = document.getElementById('mobileCards');
        tbody.innerHTML = '';
        mCards.innerHTML = '';

        for(let i=0; i<8; i++) {
            let price = base - (i * 20);
            let sellAgency = (feeType === 'percent') ? (price * (agencyVal / 100)) : agencyVal;
            let deduc = Math.max(sellAgency, Math.min(price * 0.03, 30));
            let taxBase = Math.max(0, price - totalAcq - deduc);
            let tax = taxBase * taxRate;
            let net = price - totalAcq - sellAgency - tax;

            // 1. 填充電腦版表格
            let tr = document.createElement('tr');
            if(i===0) tr.style.backgroundColor = "#fff4b3";
            tr.innerHTML = `<td>${price}</td><td>${sellAgency.toFixed(1)}</td><td>${deduc.toFixed(1)}</td><td>${taxBase.toFixed(1)}</td><td>${tax.toFixed(1)}</td><td style="color:var(--yung-red)">${net.toFixed(1)}</td>`;
            tbody.appendChild(tr);

            // 2. 填充手機版卡片 (一目了然佈局)
            let card = document.createElement('div');
            card.className = "data-card";
            if(i===0) card.style.borderLeft = "6px solid #fdb913";
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">成交價</div>
                    <div class="card-price">${price} 萬</div>
                </div>
                <div class="card-body">
                    <div class="data-item">服務費 <span>${sellAgency.toFixed(1)} 萬</span></div>
                    <div class="data-item">抵扣費用 <span>${deduc.toFixed(1)} 萬</span></div>
                    <div class="data-item">應稅所得 <span>${taxBase.toFixed(1)} 萬</span></div>
                    <div class="data-item">合一稅(${(taxRate*100)}%) <span>${tax.toFixed(1)} 萬</span></div>
                    <div class="card-footer-net">
                        <div class="net-label">預估淨獲利</div>
                        <div class="net-value">${net.toFixed(1)} 萬</div>
                    </div>
                </div>
            `;
            mCards.appendChild(card);
        }
    }

    async function saveAsImage() {
        const app = document.getElementById('main-app');
        const btn = document.getElementById('btnSave');
        btn.innerText = "⏳ 格式轉換中...";
        
        // 儲存原始手機畫面狀態
        const originalWidth = app.style.width;
        
        // 關鍵：截圖時強制切換回電腦版表格
        app.classList.add('exporting');
        
        const canvas = await html2canvas(app, { 
            scale: 2, 
            useCORS: true,
            width: 1050 // 強制截取寬度
        });
        
        app.classList.remove('exporting');
        btn.innerText = "📤 儲存報表圖檔";

        canvas.toBlob(async (blob) => {
            const file = new File([blob], '獲利報告.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '獲利報告' });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = '報告.png'; a.click();
            }
            const t = document.getElementById("toast");
            t.className = "show"; setTimeout(()=>t.className="", 3000);
        });
    }

    window.onload = generateTable;
</script>
</body>
</html>
